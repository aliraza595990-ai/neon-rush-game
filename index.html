<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON RUSH - Open World City</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; }
canvas { display: block; }
#hud { position: fixed; top: 10px; left: 10px; color: #fff; z-index: 20; text-shadow: 0 0 10px #00ffff; }
#hud .stat { font-size: 18px; font-weight: bold; margin: 4px 0; }
#money { color: #ffd700; }
#health-bar { width: 150px; height: 14px; background: #333; border-radius: 7px; overflow: hidden; margin: 4px 0; }
#health-fill { height: 100%; background: linear-gradient(90deg,#ff4444,#ff0000); border-radius: 7px; transition: width 0.3s; }
#nitro-bar { width: 150px; height: 14px; background: #333; border-radius: 7px; overflow: hidden; margin: 4px 0; }
#nitro-fill { height: 100%; background: linear-gradient(90deg,#00aaff,#00ffff); border-radius: 7px; transition: width 0.3s; }
#wanted { display: flex; gap: 4px; margin: 4px 0; }
.star { font-size: 20px; color: #333; }
.star.active { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
#speed-display { font-size: 24px; color: #00ffff; font-weight: bold; }
#mission-info { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid #00ffff; border-radius: 8px; padding: 10px; color: #fff; z-index: 20; min-width: 200px; display: none; }
#mission-title { color: #ffd700; font-weight: bold; font-size: 16px; }
#mission-desc { color: #aaa; font-size: 13px; margin-top: 4px; }
#mission-timer { color: #ff4444; font-size: 20px; font-weight: bold; margin-top: 4px; }
#minimap { position: fixed; bottom: 120px; right: 10px; width: 120px; height: 120px; border: 2px solid #00ffff; border-radius: 8px; background: rgba(0,0,0,0.7); overflow: hidden; z-index: 20; }
#main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center,#0a0a2e 0%,#000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.menu-title { font-size: 56px; font-weight: 900; letter-spacing: 6px; color: #ff0066; text-shadow: 0 0 30px #ff0066, 0 0 60px #ff006644; margin-bottom: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.8} }
.menu-sub { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 40px; }
.menu-btn { background: linear-gradient(135deg,#ff0066,#aa0044); border: none; color: #fff; padding: 16px 48px; margin: 8px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; pointer-events: all; letter-spacing: 2px; box-shadow: 0 0 20px #ff006688; transition: all 0.2s; min-width: 220px; }
.menu-btn:hover,.menu-btn:active { transform: scale(1.05); box-shadow: 0 0 30px #ff0066; }
.menu-btn.sec { background: linear-gradient(135deg,#003366,#006699); box-shadow: 0 0 20px #00336688; }
#garage-screen,#mission-screen,#shop-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 90; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
.screen-title { font-size: 32px; font-weight: bold; color: #ffd700; text-shadow: 0 0 15px #ffd700; margin-bottom: 20px; letter-spacing: 3px; margin-top: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 12px; width: 100%; max-width: 700px; }
.card { background: linear-gradient(135deg,#111,#1a1a2e); border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; pointer-events: all; transition: all 0.2s; color: #fff; }
.card:hover,.card:active { border-color: #00ffff; transform: translateY(-2px); box-shadow: 0 0 15px #00ffff44; }
.card.owned { border-color: #ffd700; }
.card.selected { border-color: #00ff00; background: linear-gradient(135deg,#001100,#002200); }
.card.easy { border-color: #00cc44; } .card.medium { border-color: #ffaa00; } .card.hard { border-color: #ff4444; }
.close-btn { position: fixed; top: 15px; right: 15px; background: #ff0044; border: none; color: #fff; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; cursor: pointer; pointer-events: all; z-index: 100; font-weight: bold; }
#controls { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; z-index: 20; pointer-events: none; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; }
.ctrl { width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; pointer-events: all; user-select: none; -webkit-user-select: none; backdrop-filter: blur(4px); }
.ctrl:active { background: rgba(255,255,255,0.35); }
.gas { background: rgba(0,200,0,0.3); border-color: #00cc00; }
.brk { background: rgba(200,0,0,0.3); border-color: #cc0000; }
.nit { background: rgba(0,100,255,0.3); border-color: #0066ff; }
.hbk { background: rgba(255,150,0,0.3); border-color: #ff9900; }
#lctrl { display: flex; gap: 8px; align-items: center; }
#rctrl { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; max-width: 200px; }
#notif { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.9); border: 2px solid #ffd700; border-radius: 12px; padding: 20px 36px; color: #ffd700; font-size: 22px; font-weight: bold; text-align: center; z-index: 200; display: none; pointer-events: none; }
#sbtns { position: fixed; bottom: 120px; left: 10px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
.sbtn { background: rgba(0,0,0,0.8); border: 1px solid #00ffff; color: #00ffff; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; pointer-events: all; }
.sbtn:hover,.sbtn:active { background: #00ffff; color: #000; }
#gameover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; }
#gameover h2 { font-size: 52px; color: #ff0044; margin-bottom: 20px; }
#gameover p { color: #888; font-size: 18px; margin-bottom: 30px; }
</style>
</head>
<body>

<div id="main-menu">
  <div class="menu-title">NEON RUSH</div>
  <div class="menu-sub">🌧️ OPEN WORLD · NEO CITY · NIGHT</div>
  <button class="menu-btn" onclick="startGame()">▶ PLAY NOW</button>
  <button class="menu-btn sec" onclick="showGarage()">🚗 GARAGE</button>
  <button class="menu-btn sec" onclick="showMissions()">📋 MISSIONS</button>
  <button class="menu-btn sec" onclick="showShop()">🛒 SHOP</button>
  <div style="color:#444;font-size:12px;margin-top:20px;letter-spacing:2px;">WASD / ARROW KEYS · N=NITRO · SPACE=HANDBRAKE · P=WANTED · ESC=CLEAR</div>
</div>

<canvas id="gc"></canvas>

<div id="hud" style="display:none">
  <div class="stat" id="money">💰 $<span id="mv">5000</span></div>
  <div class="stat">❤️ <span id="hv">100</span>/100</div>
  <div id="health-bar"><div id="health-fill" style="width:100%"></div></div>
  <div class="stat">⚡ NITRO</div>
  <div id="nitro-bar"><div id="nitro-fill" style="width:100%"></div></div>
  <div id="wanted"><span class="star" id="s1">★</span><span class="star" id="s2">★</span><span class="star" id="s3">★</span><span class="star" id="s4">★</span><span class="star" id="s5">★</span></div>
  <div class="stat" id="speed-display">🚗 0 km/h</div>
</div>

<div id="mission-info">
  <div id="mission-title">MISSION</div>
  <div id="mission-desc">Get to the target!</div>
  <div id="mission-timer">⏱ 60s</div>
</div>

<div id="minimap" style="display:none"><canvas id="mc" width="120" height="120"></canvas></div>

<div id="sbtns" style="display:none">
  <button class="sbtn" onclick="showMainMenu()">🏠 MENU</button>
  <button class="sbtn" onclick="showGarage()">🚗 CAR</button>
  <button class="sbtn" onclick="showMissions()">📋 MISSION</button>
  <button class="sbtn" onclick="showShop()">🛒 SHOP</button>
</div>

<div id="controls" style="display:none">
  <div id="lctrl">
    <div class="ctrl" ontouchstart="K.L=true" ontouchend="K.L=false">◀</div>
    <div class="ctrl" ontouchstart="K.R=true" ontouchend="K.R=false">▶</div>
  </div>
  <div id="rctrl">
    <div class="ctrl gas" ontouchstart="K.G=true" ontouchend="K.G=false">⬆️</div>
    <div class="ctrl brk" ontouchstart="K.B=true" ontouchend="K.B=false">⬇️</div>
    <div class="ctrl nit" ontouchstart="K.N=true" ontouchend="K.N=false">⚡</div>
    <div class="ctrl hbk" ontouchstart="K.H=true" ontouchend="K.H=false">🔒</div>
  </div>
</div>

<div id="notif"></div>

<div id="garage-screen">
  <button class="close-btn" onclick="closeAll()">✕</button>
  <div class="screen-title">🚗 GARAGE — BUY & SELECT CAR</div>
  <div class="grid" id="car-list"></div>
</div>

<div id="mission-screen">
  <button class="close-btn" onclick="closeAll()">✕</button>
  <div class="screen-title">📋 MISSIONS</div>
  <div class="grid" id="miss-list"></div>
</div>

<div id="shop-screen">
  <button class="close-btn" onclick="closeAll()">✕</button>
  <div class="screen-title">🛒 UPGRADE SHOP</div>
  <div class="grid" id="shop-list"></div>
</div>

<div id="gameover">
  <h2>💀 BUSTED!</h2>
  <p>You crashed! Respawn costs $500</p>
  <button class="menu-btn" onclick="respawn()">🔄 RESPAWN</button>
  <button class="menu-btn sec" onclick="showMainMenu()">🏠 MENU</button>
</div>

<script>
const CARS=[
  {id:0,name:'Sedan',icon:'🚗',price:0,color:'#4488ff',spd:3,hnd:0.04,arm:1,nm:1.5,owned:true},
  {id:1,name:'Sports GT',icon:'🏎️',price:8000,color:'#ff4444',spd:5,hnd:0.06,arm:0.8,nm:2,owned:false},
  {id:2,name:'Muscle Car',icon:'🚙',price:12000,color:'#ff8800',spd:4.5,hnd:0.05,arm:1.5,nm:1.8,owned:false},
  {id:3,name:'Taxi',icon:'🚕',price:3000,color:'#ffdd00',spd:3.5,hnd:0.045,arm:1,nm:1.5,owned:false},
  {id:4,name:'Police Car',icon:'🚔',price:15000,color:'#2255cc',spd:4.8,hnd:0.055,arm:1.2,nm:1.9,owned:false},
  {id:5,name:'SUV',icon:'🚐',price:10000,color:'#336633',spd:3.2,hnd:0.035,arm:2,nm:1.4,owned:false},
  {id:6,name:'Van',icon:'🚌',price:6000,color:'#884422',spd:2.8,hnd:0.03,arm:2.5,nm:1.3,owned:false},
  {id:7,name:'Truck',icon:'🚛',price:7000,color:'#556677',spd:2.5,hnd:0.025,arm:3,nm:1.2,owned:false},
  {id:8,name:'Ghost Racer',icon:'👻',price:25000,color:'#aa00ff',spd:6,hnd:0.07,arm:1,nm:2.5,owned:false},
  {id:9,name:'SWAT Van',icon:'🔷',price:30000,color:'#222244',spd:3.8,hnd:0.04,arm:4,nm:1.6,owned:false},
];
const MISSIONS=[
  {id:0,name:'Pizza Delivery',icon:'🍕',diff:'easy',desc:'Deliver pizza to Downtown!',reward:500,time:60},
  {id:1,name:'Taxi Rush',icon:'🚕',diff:'easy',desc:'Pick up passengers fast!',reward:700,time:90},
  {id:2,name:'Escape Police',icon:'🚔',diff:'easy',desc:'Escape police cars!',reward:800,time:45,wanted:2},
  {id:3,name:'Time Trial',icon:'⏱️',diff:'easy',desc:'Reach checkpoint in time!',reward:600,time:30},
  {id:4,name:'Courier Run',icon:'📦',diff:'easy',desc:'Deliver 3 packages!',reward:900,time:120},
  {id:5,name:'Street Race',icon:'🏁',diff:'medium',desc:'Win the street race!',reward:2000,time:60},
  {id:6,name:'Chase Criminal',icon:'👿',diff:'medium',desc:'Catch the thief!',reward:2500,time:60},
  {id:7,name:'Rescue Mission',icon:'🆘',diff:'medium',desc:'Rescue the hostage!',reward:3000,time:90},
  {id:8,name:'Escort VIP',icon:'⭐',diff:'medium',desc:'Escort VIP to safety!',reward:2800,time:120},
  {id:9,name:'Survive Waves',icon:'🌊',diff:'medium',desc:'Survive 3 cop waves!',reward:3500,time:120,wanted:3},
  {id:10,name:'Big Heist',icon:'💰',diff:'hard',desc:'Rob the bank & escape!',reward:8000,time:90,wanted:4},
  {id:11,name:'Destroy Targets',icon:'💥',diff:'hard',desc:'Ram all 5 targets!',reward:6000,time:60},
  {id:12,name:'Boss Chase',icon:'😈',diff:'hard',desc:'Catch the crime boss!',reward:10000,time:120},
  {id:13,name:'Final Escape',icon:'🏆',diff:'hard',desc:'Escape from the city!',reward:15000,time:180,wanted:5},
  {id:14,name:'Ghost Run',icon:'👻',diff:'hard',desc:'Complete the ghost run!',reward:12000,time:90},
];
const SHOP=[
  {name:'Engine Upgrade',icon:'⚙️',desc:'Speed +20%',price:2000,stat:'spd'},
  {name:'Armor Plate',icon:'🛡️',desc:'Armor +50%',price:1500,stat:'arm'},
  {name:'Nitro Tank',icon:'⚡',desc:'Nitro +30%',price:1000,stat:'nm'},
  {name:'Sport Tires',icon:'🔘',desc:'Handling +20%',price:1200,stat:'hnd'},
  {name:'Full Repair',icon:'🔧',desc:'Health 100%',price:500,repair:true},
  {name:'Cash Pack',icon:'💵',desc:'+$5000 Cash',price:0,cash:5000},
  {name:'Turbo Kit',icon:'💨',desc:'Speed +30%',price:3000,stat:'spd'},
  {name:'Neon Kit',icon:'🌈',desc:'Neon underglow!',price:800,cosm:true},
];

const WW=3000,WH=3000;
let GS={money:5000,hp:100,maxHp:100,nitro:100,maxNitro:100,nitroR:0,wanted:0,wTimer:0,car:0,mActive:false,mTimer:0,mTarget:null,completed:[],running:false,upgrades:{spd:1,arm:1,nm:1,hnd:1}};
let P={x:1000,y:1000,a:0,vx:0,vy:0,spd:0};
let cops=[];
let cam={x:0,y:0};
let K={G:false,B:false,L:false,R:false,N:false,H:false};
let roads=[],blds=[],trees=[],rain=[];
let curMission=null;
let ntTimer=null;

const cv=document.getElementById('gc');
const cx=cv.getContext('2d');
const mc=document.getElementById('mc');
const mx=mc.getContext('2d');

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

function gen(){
  roads=[];blds=[];trees=[];rain=[];
  for(let y=100;y<WH;y+=200)roads.push({x:0,y,w:WW,h:40,d:'h'});
  for(let x=100;x<WW;x+=200)roads.push({x,y:0,w:40,h:WH,d:'v'});
  const BC=['#1a1a2e','#16213e','#0f3460','#1e1e3f','#2d1b69'];
  const NC=['#ff0066','#00ffff','#ff6600','#9900ff','#00ff44','#ff00aa'];
  for(let bx=140;bx<WW-200;bx+=200){
    for(let by=140;by<WH-200;by+=200){
      blds.push({x:bx+Math.random()*30,y:by+Math.random()*30,w:70+Math.random()*70,h:60+Math.random()*80,c:BC[Math.floor(Math.random()*BC.length)],n:NC[Math.floor(Math.random()*NC.length)],glow:Math.random()>0.5});
    }
  }
  for(let i=0;i<200;i++)trees.push({x:Math.random()*WW,y:Math.random()*WH,r:10+Math.random()*14});
  for(let i=0;i<300;i++)rain.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,s:7+Math.random()*6,l:14+Math.random()*20});
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')K.G=true;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')K.B=true;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')K.L=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')K.R=true;
  if(e.key==='n'||e.key==='N')K.N=true;
  if(e.key===' ')K.H=true;
  if(e.key==='p'||e.key==='P'){GS.wanted=Math.min(5,GS.wanted+1);spawnCops();upHUD();}
  if(e.key==='Escape'){GS.wanted=0;cops=[];upHUD();}
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')K.G=false;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')K.B=false;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')K.L=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')K.R=false;
  if(e.key==='n'||e.key==='N')K.N=false;
  if(e.key===' ')K.H=false;
});

function startGame(){
  document.getElementById('main-menu').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('controls').style.display='flex';
  document.getElementById('sbtns').style.display='flex';
  document.getElementById('minimap').style.display='block';
  closeAll();
  GS.running=true;
  loop();
}
function showMainMenu(){
  GS.running=false;
  document.getElementById('main-menu').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';
  document.getElementById('sbtns').style.display='none';
  document.getElementById('minimap').style.display='none';
  closeAll();
}
function closeAll(){
  document.getElementById('garage-screen').style.display='none';
  document.getElementById('mission-screen').style.display='none';
  document.getElementById('shop-screen').style.display='none';
  document.getElementById('gameover').style.display='none';
}
function showGarage(){
  document.getElementById('garage-screen').style.display='flex';
  const L=document.getElementById('car-list');L.innerHTML='';
  CARS.forEach(c=>{
    const d=document.createElement('div');
    d.className='card'+(c.owned?' owned':'')+(GS.car===c.id?' selected':'');
    d.innerHTML=`<div style="font-size:36px">${c.icon}</div><div style="font-size:14px;font-weight:bold;margin-top:6px">${c.name}</div><div style="color:#ffd700;font-size:13px;margin-top:4px">${c.owned?(GS.car===c.id?'✅ SELECTED':'✅ OWNED'):'💰 $'+c.price}</div><div style="color:#888;font-size:11px;margin-top:6px">SPD:${c.spd} HND:${(c.hnd*100).toFixed(0)} ARM:${c.arm}</div>`;
    d.onclick=()=>{
      if(c.owned){GS.car=c.id;notify('🚗 '+c.name+' Selected!');showGarage();}
      else if(GS.money>=c.price){GS.money-=c.price;c.owned=true;GS.car=c.id;upHUD();notify('✅ Bought '+c.name+'!');showGarage();}
      else notify('❌ Need $'+c.price+'!');
    };
    L.appendChild(d);
  });
}
function showMissions(){
  document.getElementById('mission-screen').style.display='flex';
  const L=document.getElementById('miss-list');L.innerHTML='';
  MISSIONS.forEach(m=>{
    const done=GS.completed.includes(m.id);
    const d=document.createElement('div');
    d.className='card '+m.diff+(done?' completed':'');
    d.innerHTML=`<div style="font-size:11px;font-weight:bold;color:${m.diff==='easy'?'#00cc44':m.diff==='medium'?'#ffaa00':'#ff4444'}">${m.diff.toUpperCase()}</div><div style="font-size:28px;margin:6px 0">${m.icon}</div><div style="font-size:13px;font-weight:bold">${m.name}</div><div style="font-size:11px;color:#aaa;margin-top:4px">${m.desc}</div><div style="color:#ffd700;font-size:13px;margin-top:6px">💰 $${m.reward}</div><div style="font-size:11px;color:#666">⏱ ${m.time}s ${done?'✅':''}</div>`;
    d.onclick=()=>{closeAll();startMiss(m);if(!GS.running)startGame();};
    L.appendChild(d);
  });
}
function showShop(){
  document.getElementById('shop-screen').style.display='flex';
  const L=document.getElementById('shop-list');L.innerHTML='';
  SHOP.forEach(item=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div style="font-size:32px">${item.icon}</div><div style="font-size:14px;font-weight:bold;margin-top:6px">${item.name}</div><div style="font-size:12px;color:#aaa;margin-top:4px">${item.desc}</div><div style="color:#ffd700;font-size:13px;margin-top:6px">${item.price>0?'💰 $'+item.price:'🆓 FREE'}</div>`;
    d.onclick=()=>{
      if(item.cash){GS.money+=item.cash;upHUD();notify('💵 +$'+item.cash+' Cash!');}
      else if(item.repair){if(GS.money>=item.price){GS.money-=item.price;GS.hp=GS.maxHp;upHUD();notify('🔧 Fully Repaired!');}else notify('❌ Need $'+item.price);}
      else if(GS.money>=item.price){GS.money-=item.price;if(item.stat)GS.upgrades[item.stat]*=1.2;upHUD();notify('✅ '+item.name+' Installed!');}
      else notify('❌ Need $'+item.price+'!');
    };
    L.appendChild(d);
  });
}

function startMiss(m){
  curMission=m;GS.mActive=true;GS.mTimer=m.time;
  const rx=[100,300,500,700,900,1100,1300,1500,1700,1900,2100,2300,2500];
  GS.mTarget={x:rx[Math.floor(Math.random()*rx.length)]+20,y:rx[Math.floor(Math.random()*rx.length)]+20};
  document.getElementById('mission-info').style.display='block';
  document.getElementById('mission-title').textContent=m.icon+' '+m.name;
  document.getElementById('mission-desc').textContent=m.desc;
  if(m.wanted){GS.wanted=Math.min(5,m.wanted);spawnCops();}
  notify('🚗 MISSION: '+m.name);
}
function doneMiss(){
  GS.money+=curMission.reward;GS.mActive=false;GS.mTarget=null;
  if(!GS.completed.includes(curMission.id))GS.completed.push(curMission.id);
  document.getElementById('mission-info').style.display='none';
  upHUD();notify('🏆 COMPLETE! +$'+curMission.reward);
}

function spawnCops(){
  const n=GS.wanted*2;
  while(cops.length<n){
    cops.push({x:P.x+(Math.random()-0.5)*700,y:P.y+(Math.random()-0.5)*700,a:0,vx:0,vy:0});
  }
}

function upd(dt){
  if(!GS.running)return;
  const car=CARS[GS.car];
  const top=car.spd*GS.upgrades.spd;
  const hnd=car.hnd*GS.upgrades.hnd;
  let ac=0;
  let nit=false;
  if(K.N&&GS.nitro>0){nit=true;GS.nitro=Math.max(0,GS.nitro-1.5);ac=0.4*car.nm*GS.upgrades.nm;}
  if(K.G)ac=Math.max(ac,0.28);
  if(K.B)ac=-0.22;
  P.spd+=ac;
  if(K.H)P.spd*=0.86;else P.spd*=0.93;
  P.spd=Math.max(-top*0.5,Math.min(top,P.spd));
  if(K.L)P.a-=hnd*(1+Math.abs(P.spd)*0.3);
  if(K.R)P.a+=hnd*(1+Math.abs(P.spd)*0.3);
  P.vx=Math.sin(P.a)*P.spd;P.vy=-Math.cos(P.a)*P.spd;
  P.x+=P.vx;P.y+=P.vy;
  P.x=Math.max(20,Math.min(WW-20,P.x));P.y=Math.max(20,Math.min(WH-20,P.y));
  cam.x=P.x-cv.width/2;cam.y=P.y-cv.height/2;
  GS.nitroR++;if(GS.nitroR>60&&!nit){GS.nitro=Math.min(GS.maxNitro,GS.nitro+0.4);if(GS.nitroR>80)GS.nitroR=60;}
  if(nit)GS.nitroR=0;
  if(GS.wanted>0){GS.wTimer++;if(GS.wTimer>600){GS.wanted=Math.max(0,GS.wanted-1);GS.wTimer=0;if(!GS.wanted)cops=[];}}
  if(GS.wanted>0){
    cops.forEach(c=>{
      const dx=P.x-c.x,dy=P.y-c.y,dist=Math.sqrt(dx*dx+dy*dy);
      const ta=Math.atan2(dy,dx)-Math.PI/2;
      let ad=ta-c.a;while(ad>Math.PI)ad-=Math.PI*2;while(ad<-Math.PI)ad+=Math.PI*2;
      c.a+=ad*0.06;
      const cs=dist>50?2.5:0;
      c.vx+=Math.sin(c.a)*cs*0.1;c.vy-=Math.cos(c.a)*cs*0.1;
      c.vx*=0.9;c.vy*=0.9;c.x+=c.vx;c.y+=c.vy;
      c.x=Math.max(20,Math.min(WW-20,c.x));c.y=Math.max(20,Math.min(WH-20,c.y));
      if(dist<40){const dm=0.4/(GS.upgrades.arm*car.arm);GS.hp=Math.max(0,GS.hp-dm);upHUD();}
    });
    while(cops.length>GS.wanted*2)cops.pop();
  }
  if(GS.mActive&&curMission){
    GS.mTimer-=dt;document.getElementById('mission-timer').textContent='⏱ '+Math.ceil(GS.mTimer)+'s';
    if(GS.mTimer<=0){GS.mActive=false;document.getElementById('mission-info').style.display='none';notify('❌ FAILED! Time up!');}
    if(GS.mTarget){
      const dx=P.x-GS.mTarget.x,dy=P.y-GS.mTarget.y;
      if(Math.sqrt(dx*dx+dy*dy)<60)doneMiss();
    }
  }
  rain.forEach(r=>{r.y+=r.s;r.x+=1.5;if(r.y>cv.height){r.y=-20;r.x=Math.random()*cv.width;}if(r.x>cv.width)r.x=0;});
  if(GS.hp<=0){GS.running=false;document.getElementById('gameover').style.display='flex';}
  upHUD();
}

function draw(){
  const W=cv.width,H=cv.height;
  cx.fillStyle='#050510';cx.fillRect(0,0,W,H);
  cx.save();cx.translate(-cam.x,-cam.y);
  cx.fillStyle='#111118';
  roads.forEach(r=>cx.fillRect(r.x,r.y,r.w,r.h));
  cx.strokeStyle='#2a2a35';cx.lineWidth=1;cx.setLineDash([20,20]);
  roads.forEach(r=>{cx.beginPath();if(r.d==='h'){cx.moveTo(r.x,r.y+r.h/2);cx.lineTo(r.x+r.w,r.y+r.h/2);}else{cx.moveTo(r.x+r.w/2,r.y);cx.lineTo(r.x+r.w/2,r.y+r.h);}cx.stroke();});
  cx.setLineDash([]);
  blds.forEach(b=>{
    cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(b.x+4,b.y+4,b.w,b.h);
    cx.fillStyle=b.c;cx.fillRect(b.x,b.y,b.w,b.h);
    cx.fillStyle='rgba(255,230,100,0.35)';
    for(let wx=b.x+6;wx<b.x+b.w-4;wx+=10)for(let wy=b.y+6;wy<b.y+b.h-4;wy+=10)if(Math.random()>0.35)cx.fillRect(wx,wy,5,6);
    if(b.glow){cx.strokeStyle=b.n;cx.lineWidth=2;cx.shadowColor=b.n;cx.shadowBlur=10;cx.strokeRect(b.x+2,b.y+2,b.w-4,b.h-4);cx.shadowBlur=0;cx.lineWidth=1;}
  });
  trees.forEach(t=>{
    cx.fillStyle='#0a2e0a';cx.beginPath();cx.arc(t.x,t.y,t.r,0,Math.PI*2);cx.fill();
    cx.fillStyle='#0f4a0f';cx.beginPath();cx.arc(t.x-2,t.y-2,t.r*0.65,0,Math.PI*2);cx.fill();
  });
  if(GS.mActive&&GS.mTarget){
    const tx=GS.mTarget.x,ty=GS.mTarget.y;
    cx.strokeStyle='#ffd700';cx.lineWidth=3;cx.shadowColor='#ffd700';cx.shadowBlur=15;
    cx.beginPath();cx.arc(tx,ty,25+Math.sin(Date.now()/200)*5,0,Math.PI*2);cx.stroke();
    cx.shadowBlur=0;cx.fillStyle='#ffd700';cx.font='bold 20px Arial';cx.textAlign='center';
    cx.fillText('🎯',tx,ty+8);
    const da=Math.atan2(ty-P.y,tx-P.x),ax=P.x+Math.cos(da)*80,ay=P.y+Math.sin(da)*80;
    cx.save();cx.translate(ax,ay);cx.rotate(da+Math.PI/2);
    cx.fillStyle='#ffd700';cx.shadowColor='#ffd700';cx.shadowBlur=8;
    cx.beginPath();cx.moveTo(0,-14);cx.lineTo(7,5);cx.lineTo(-7,5);cx.closePath();cx.fill();
    cx.shadowBlur=0;cx.restore();cx.textAlign='left';
  }
  cops.forEach(c=>{
    cx.save();cx.translate(c.x,c.y);cx.rotate(c.a);
    cx.fillStyle='#1144cc';cx.fillRect(-10,-16,20,32);
    const t=Math.floor(Date.now()/200)%2;
    cx.fillStyle=t?'#ff0000':'#0000ff';cx.fillRect(-8,-16,8,6);
    cx.fillStyle=t?'#0000ff':'#ff0000';cx.fillRect(0,-16,8,6);
    cx.fillStyle='#88aaff';cx.fillRect(-7,-8,14,10);
    cx.restore();
  });
  const car=CARS[GS.car];
  cx.save();cx.translate(P.x,P.y);cx.rotate(P.a);
  if(K.N&&GS.nitro>0){
    cx.fillStyle='#ff6600';cx.shadowColor='#ff6600';cx.shadowBlur=18;
    cx.beginPath();cx.moveTo(-5,18);cx.lineTo(5,18);cx.lineTo(0,32+Math.random()*10);cx.closePath();cx.fill();cx.shadowBlur=0;
  }
  cx.fillStyle='rgba(0,0,0,0.35)';cx.fillRect(-10,-18,22,36);
  cx.fillStyle=car.color;cx.shadowColor=car.color;cx.shadowBlur=10;
  cx.fillRect(-10,-18,20,36);cx.shadowBlur=0;
  cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(-8,-16,16,8);
  cx.fillStyle='#aaddff';cx.fillRect(-7,-6,14,10);
  cx.strokeStyle='rgba(0,255,255,0.5)';cx.lineWidth=1;cx.shadowColor='#00ffff';cx.shadowBlur=6;
  cx.strokeRect(-10,-18,20,36);cx.shadowBlur=0;
  cx.restore();
  cx.restore();
  cx.strokeStyle='rgba(150,210,255,0.2)';cx.lineWidth=1;
  rain.forEach(r=>{cx.beginPath();cx.moveTo(r.x,r.y);cx.lineTo(r.x+2,r.y+r.l);cx.stroke();});
  drawMM();
}

function drawMM(){
  mx.fillStyle='#0a0a1a';mx.fillRect(0,0,120,120);
  mx.fillStyle='#1a1a2a';
  roads.forEach(r=>mx.fillRect(r.x/WW*120,r.y/WH*120,r.w/WW*120,r.h/WH*120));
  const px=P.x/WW*120,py=P.y/WH*120;
  mx.fillStyle='#00ff00';mx.beginPath();mx.arc(px,py,3,0,Math.PI*2);mx.fill();
  cops.forEach(c=>{mx.fillStyle='#ff4444';mx.beginPath();mx.arc(c.x/WW*120,c.y/WH*120,2,0,Math.PI*2);mx.fill();});
  if(GS.mTarget){mx.fillStyle='#ffd700';mx.beginPath();mx.arc(GS.mTarget.x/WW*120,GS.mTarget.y/WH*120,3,0,Math.PI*2);mx.fill();}
  mx.strokeStyle='#00ffff44';mx.lineWidth=1;mx.strokeRect(cam.x/WW*120,cam.y/WH*120,cv.width/WW*120,cv.height/WH*120);
}

function upHUD(){
  document.getElementById('mv').textContent=GS.money.toLocaleString();
  document.getElementById('hv').textContent=Math.ceil(GS.hp);
  document.getElementById('health-fill').style.width=(GS.hp/GS.maxHp*100)+'%';
  document.getElementById('nitro-fill').style.width=(GS.nitro/GS.maxNitro*100)+'%';
  document.getElementById('speed-display').textContent='🚗 '+Math.abs(Math.round(P.spd*20))+' km/h';
  for(let i=1;i<=5;i++)document.getElementById('s'+i).className='star'+(i<=GS.wanted?' active':'');
}

function notify(msg){
  const el=document.getElementById('notif');el.textContent=msg;el.style.display='block';
  if(ntTimer)clearTimeout(ntTimer);
  ntTimer=setTimeout(()=>el.style.display='none',2500);
}

function respawn(){
  if(GS.money>=500)GS.money-=500;
  GS.hp=GS.maxHp;P.x=1000+Math.random()*200;P.y=1000+Math.random()*200;P.vx=0;P.vy=0;P.spd=0;
  cops=[];GS.wanted=0;document.getElementById('gameover').style.display='none';GS.running=true;upHUD();
}

let lt=0;
function loop(ts=0){
  const dt=(ts-lt)/1000;lt=ts;
  upd(Math.min(dt,0.05));
  draw();
  if(GS.running)requestAnimationFrame(loop);
}

gen();upHUD();
</script>
</body>
</html>
