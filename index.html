<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON RUSH - Open World Driving</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; }
canvas { display: block; }
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
.hud-box { background: rgba(0,0,0,0.75); border: 1px solid #00ffe0; border-radius: 8px; padding: 8px 14px; color: #fff; font-size: 13px; min-width: 110px; }
.hud-box .label { color: #00ffe0; font-size: 10px; letter-spacing: 1px; }
.hud-box .value { font-size: 18px; font-weight: bold; margin-top: 2px; }
#wanted-stars { display: flex; gap: 3px; margin-top: 3px; }
.star { font-size: 16px; color: #333; }
.star.active { color: #ff4444; }
#health-bar-wrap { position: absolute; top: 90px; left: 10px; background: rgba(0,0,0,0.7); border: 1px solid #ff4444; border-radius: 6px; padding: 5px 10px; min-width: 130px; }
#health-bar-wrap .label { color: #ff4444; font-size: 10px; }
#health-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 4px; }
#health-fill { height: 100%; background: linear-gradient(90deg,#ff4444,#ff8800); border-radius: 5px; width: 100%; transition: width 0.3s; }
#nitro-bar-wrap { position: absolute; top: 90px; right: 10px; background: rgba(0,0,0,0.7); border: 1px solid #00aaff; border-radius: 6px; padding: 5px 10px; min-width: 130px; }
#nitro-bar-wrap .label { color: #00aaff; font-size: 10px; }
#nitro-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 4px; }
#nitro-fill { height: 100%; background: linear-gradient(90deg,#0044ff,#00aaff); border-radius: 5px; width: 100%; transition: width 0.2s; }
#mission-box { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid #ffaa00; border-radius: 8px; padding: 8px 16px; color: #fff; text-align: center; min-width: 200px; }
#mission-box .m-label { color: #ffaa00; font-size: 10px; letter-spacing: 1px; }
#mission-box .m-text { font-size: 13px; margin-top: 2px; }
#mission-box .m-reward { color: #00ff88; font-size: 11px; margin-top: 2px; }
#speedometer { position: absolute; bottom: 130px; right: 10px; background: rgba(0,0,0,0.75); border: 1px solid #00ffe0; border-radius: 8px; padding: 8px 14px; color: #fff; text-align: center; }
#speedometer .spd { font-size: 28px; font-weight: bold; color: #00ffe0; }
#speedometer .spd-label { font-size: 10px; color: #888; }
#minimap { position: absolute; bottom: 130px; left: 10px; width: 110px; height: 110px; background: rgba(0,0,0,0.85); border: 1px solid #00ffe0; border-radius: 8px; overflow: hidden; }
#message { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.92); border: 2px solid #ffaa00; border-radius: 12px; padding: 16px 28px; color: #fff; text-align: center; font-size: 18px; display: none; min-width: 220px; max-width: 320px; }
#message .msg-title { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
#message .msg-sub { font-size: 13px; color: #aaa; white-space: pre-line; }
#message button { margin-top: 12px; padding: 8px 24px; background: linear-gradient(135deg,#ffaa00,#ff6600); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; pointer-events: all; }
#controls { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; pointer-events: all; }
.ctrl-side { display: flex; gap: 8px; align-items: center; }
.ctrl-btn { width: 58px; height: 58px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; cursor: pointer; user-select: none; }
.ctrl-btn.gas { border-color: #00ff88; color: #00ff88; }
.ctrl-btn.brake { border-color: #ff4444; color: #ff4444; }
.ctrl-btn.nitro { border-color: #00aaff; color: #00aaff; width: 64px; height: 64px; font-size: 13px; font-weight: bold; }
.ctrl-btn.hbrake { border-color: #ffaa00; color: #ffaa00; font-size: 12px; font-weight: bold; }
#main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center,#0d0d2b 0%,#050510 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #fff; }
.menu-title { font-size: 52px; font-weight: 900; letter-spacing: 6px; background: linear-gradient(135deg,#00ffe0,#0080ff,#ff00aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.menu-sub { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 40px; }
.menu-btn { width: 240px; padding: 14px; margin: 8px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
.btn-play { background: linear-gradient(135deg,#00ffe0,#0080ff); color: #000; }
.btn-missions { background: linear-gradient(135deg,#ffaa00,#ff6600); color: #000; }
.btn-garage { background: linear-gradient(135deg,#aa00ff,#ff00aa); color: #fff; }
.menu-stars { color: #ffaa00; font-size: 28px; margin-bottom: 16px; letter-spacing: 4px; }
#mission-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 100; display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
#garage-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 100; display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
.screen-title { font-size: 28px; font-weight: bold; color: #00ffe0; letter-spacing: 3px; margin-bottom: 20px; margin-top: 10px; }
.back-btn { position: fixed; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: 1px solid #555; border-radius: 8px; padding: 8px 16px; color: #fff; font-size: 13px; cursor: pointer; z-index: 200; }
.mission-card { width: 100%; max-width: 380px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 14px 18px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; color: #fff; }
.mission-card.available { border-color: #ffaa00; }
.mission-card.completed { border-color: #00ff88; opacity: 0.7; }
.mission-card.locked { opacity: 0.4; }
.m-info .m-name { font-size: 15px; font-weight: bold; }
.m-info .m-desc { font-size: 11px; color: #888; margin-top: 3px; }
.m-info .m-diff { font-size: 10px; margin-top: 4px; }
.diff-easy { color: #00ff88; }
.diff-medium { color: #ffaa00; }
.diff-hard { color: #ff4444; }
.m-right { text-align: right; }
.m-reward-text { color: #ffaa00; font-size: 14px; font-weight: bold; }
.m-status { font-size: 20px; margin-top: 4px; }
.start-btn { padding: 6px 14px; border: none; border-radius: 6px; background: linear-gradient(135deg,#ffaa00,#ff6600); color: #000; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 6px; }
.car-card { width: 100%; max-width: 380px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 14px 18px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; color: #fff; }
.car-card.owned { border-color: #00ffe0; }
.car-card.selected { border-color: #aa00ff; background: rgba(170,0,255,0.1); }
.car-icon { font-size: 36px; }
.car-info .c-name { font-size: 15px; font-weight: bold; }
.car-info .c-stats { font-size: 10px; color: #888; margin-top: 4px; }
.car-info .c-stat { margin-top: 2px; }
.stat-bar { display: inline-block; height: 5px; background: #00ffe0; border-radius: 3px; vertical-align: middle; margin-left: 5px; }
.car-right { text-align: right; }
.car-price { color: #ffaa00; font-size: 15px; font-weight: bold; }
.buy-btn { padding: 7px 16px; border: none; border-radius: 6px; background: linear-gradient(135deg,#00ffe0,#0080ff); color: #000; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 6px; display: block; }
.buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.select-btn { padding: 7px 16px; border: none; border-radius: 6px; background: linear-gradient(135deg,#aa00ff,#ff00aa); color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 6px; display: block; }
#rain-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 5; opacity: 0.3; }
</style>
</head>
<body>
<canvas id="rain-canvas"></canvas>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-box"><div class="label">&#128176; CASH</div><div class="value" id="cash-val">$500</div></div>
    <div class="hud-box" style="text-align:center"><div class="label">&#11088; WANTED</div><div id="wanted-stars"><span class="star" id="s1">&#9733;</span><span class="star" id="s2">&#9733;</span><span class="star" id="s3">&#9733;</span><span class="star" id="s4">&#9733;</span><span class="star" id="s5">&#9733;</span></div></div>
    <div class="hud-box" style="text-align:right"><div class="label">&#128663; CAR</div><div class="value" id="car-val" style="font-size:13px">Sedan</div></div>
  </div>
  <div id="health-bar-wrap"><div class="label">&#10084; HEALTH</div><div id="health-bar"><div id="health-fill"></div></div></div>
  <div id="nitro-bar-wrap"><div class="label">&#9889; NITRO</div><div id="nitro-bar"><div id="nitro-fill"></div></div></div>
  <div id="mission-box"><div class="m-label">&#128203; MISSION</div><div class="m-text" id="mission-text">Drive around Neo City!</div><div class="m-reward" id="mission-reward">Open MISSIONS to start!</div></div>
  <div id="speedometer"><div class="spd" id="speed-val">0</div><div class="spd-label">KM/H</div></div>
  <div id="minimap"><canvas id="minimapCanvas" width="110" height="110"></canvas></div>
  <div id="message"><div class="msg-title" id="msg-title">Welcome!</div><div class="msg-sub" id="msg-sub">Drive to the orange target!</div><button onclick="closeMessage()">OK &#10003;</button></div>
  <div id="controls">
    <div class="ctrl-side">
      <div class="ctrl-btn" id="btn-left">&#9668;</div>
      <div class="ctrl-btn" id="btn-right">&#9658;</div>
    </div>
    <div class="ctrl-side" style="flex-direction:column;gap:6px">
      <div class="ctrl-btn nitro" id="btn-nitro">&#9889; NITRO</div>
      <div class="ctrl-btn hbrake" id="btn-hb">DRIFT</div>
    </div>
    <div class="ctrl-side" style="flex-direction:column;gap:6px">
      <div class="ctrl-btn gas" id="btn-gas">&#9650;</div>
      <div class="ctrl-btn brake" id="btn-brake">&#9660;</div>
    </div>
  </div>
</div>
<div id="main-menu">
  <div class="menu-stars">&#9733; &#9733; &#9733;</div>
  <div class="menu-title">NEON RUSH</div>
  <div class="menu-sub">OPEN WORLD CITY DRIVING</div>
  <button class="menu-btn btn-play" onclick="startGame()">&#127918; PLAY NOW</button>
  <button class="menu-btn btn-missions" onclick="showMissions()">&#128203; MISSIONS</button>
  <button class="menu-btn btn-garage" onclick="showGarage()">&#128663; GARAGE</button>
</div>
<div id="mission-screen">
  <button class="back-btn" onclick="hideMissions()">&#8592; Back</button>
  <div class="screen-title">&#128203; MISSIONS</div>
  <div id="mission-list"></div>
</div>
<div id="garage-screen">
  <button class="back-btn" onclick="hideGarage()">&#8592; Back</button>
  <div class="screen-title">&#128663; GARAGE</div>
  <div style="color:#ffaa00;margin-bottom:12px;font-size:16px" id="garage-cash"></div>
  <div id="car-list"></div>
</div>
<script>
const CARS=[
{id:0,name:'Street Sedan',icon:'&#128663;',speed:5,handling:5,armor:3,nitroBoost:1.5,price:0,color:'#4488ff'},
{id:1,name:'Sports GT',icon:'&#127950;',speed:8,handling:7,armor:2,nitroBoost:2.0,price:3000,color:'#ff4444'},
{id:2,name:'Muscle Car',icon:'&#128664;',speed:7,handling:4,armor:6,nitroBoost:1.8,price:5000,color:'#ff8800'},
{id:3,name:'Taxi Cab',icon:'&#128661;',speed:5,handling:5,armor:4,nitroBoost:1.4,price:1500,color:'#ffdd00'},
{id:4,name:'Police Car',icon:'&#128660;',speed:7,handling:7,armor:5,nitroBoost:1.7,price:8000,color:'#0044ff'},
{id:5,name:'Monster Truck',icon:'&#128667;',speed:4,handling:3,armor:9,nitroBoost:1.3,price:10000,color:'#886600'},
{id:6,name:'Van',icon:'&#128656;',speed:4,handling:4,armor:7,nitroBoost:1.3,price:2000,color:'#888888'},
{id:7,name:'SUV',icon:'&#128667;',speed:6,handling:5,armor:7,nitroBoost:1.5,price:4000,color:'#226622'},
{id:8,name:'Ghost Racer',icon:'&#128128;',speed:10,handling:9,armor:4,nitroBoost:2.5,price:20000,color:'#aa00ff'},
{id:9,name:'Neon Phantom',icon:'&#9889;',speed:9,handling:10,armor:3,nitroBoost:3.0,price:15000,color:'#00ffff'},
];
const MISSIONS=[
{id:0,name:'First Delivery',desc:'Deliver a package across town',diff:'easy',reward:300,target:{x:1200,y:400},story:'A mysterious package needs delivery!\nDrive to the marked location!',unlocks:1},
{id:1,name:'Taxi Rush',desc:'Pick up passengers fast!',diff:'easy',reward:400,target:{x:300,y:1500},story:'Drive to the taxi stand!\nPick up passengers before time runs out!',unlocks:2},
{id:2,name:'Police Escape',desc:'Escape to the safe house!',diff:'easy',reward:500,target:{x:800,y:800},story:'You attracted police!\nEscape to the safe house fast!',unlocks:3},
{id:3,name:'Time Trial',desc:'Reach checkpoint in 60 sec',diff:'easy',reward:600,target:{x:1600,y:300},story:'Race against the clock!\nReach the finish line!',unlocks:4},
{id:4,name:'Street Race',desc:'Beat racers to the finish',diff:'medium',reward:1000,target:{x:400,y:200},story:'Underground street race tonight!\nWin to earn respect!',unlocks:5},
{id:5,name:'Criminal Chase',desc:'Chase the getaway car!',diff:'medium',reward:1200,target:{x:1800,y:1800},story:'A criminal is fleeing!\nRam his car to stop him!',unlocks:6},
{id:6,name:'VIP Escort',desc:'Escort the VIP safely',diff:'medium',reward:1500,target:{x:200,y:1800},story:'Protect the VIP car!\nDo not let them crash it!',unlocks:7},
{id:7,name:'Survive the Wave',desc:'Survive 3 police waves!',diff:'medium',reward:2000,target:{x:1000,y:1000},story:'Police surrounded you!\nSurvive for 3 minutes!',unlocks:8},
{id:8,name:'Bank Heist',desc:'Steal the cash and escape!',diff:'hard',reward:3000,target:{x:1400,y:600},story:'The big job!\nRob the cash transport and escape!',unlocks:9},
{id:9,name:'FINAL: Take Down Rex',desc:'Destroy Rex convoy!',diff:'hard',reward:5000,target:{x:1000,y:200},story:'Chief Rex is fleeing!\nTake down his convoy to expose him!',unlocks:null},
];
let state={cash:500,health:100,nitro:100,wantedLevel:0,ownedCars:[0],selectedCar:0,completedMissions:[],currentMission:null,playing:false};
try{const s=JSON.parse(localStorage.getItem('neonrush'));if(s)Object.assign(state,s);}catch(e){}
function saveState(){try{localStorage.setItem('neonrush',JSON.stringify(state));}catch(e){}}
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;const rc=document.getElementById('rain-canvas');rc.width=window.innerWidth;rc.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const WORLD=2400,ROAD_W=60;
const BLOCKS=[];
function genCity(){const sp=220;for(let x=100;x<WORLD-100;x+=sp){for(let y=100;y<WORLD-100;y+=sp){const w=80+Math.random()*60,h=80+Math.random()*60;BLOCKS.push({x,y,w,h,color:`hsl(${200+Math.random()*40},${20+Math.random()*20}%,${12+Math.random()*10}%)`,neon:`hsl(${Math.random()*360},100%,60%)`,floors:Math.floor(2+Math.random()*6)});}}}
genCity();
let car={x:1000,y:1000,angle:0,vx:0,vy:0,speed:0,maxSpeed:0,acc:0,handling:0,nitroBoost:1.5};
function applyCar(id){const c=CARS[id];car.maxSpeed=c.speed*3.5;car.acc=c.speed*0.12;car.handling=c.handling*0.018;car.nitroBoost=c.nitroBoost;}
applyCar(state.selectedCar);
const police=[];
function spawnPolice(n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=400+Math.random()*200;police.push({x:car.x+Math.cos(a)*d,y:car.y+Math.sin(a)*d,angle:0,speed:0,vx:0,vy:0});}}
let target=null,particles=[],explosions=[];
const keys={up:false,down:false,left:false,right:false,nitro:false,hand:false};
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')keys.up=true;if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')keys.down=true;if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;if(e.key==='n'||e.key==='N')keys.nitro=true;if(e.key===' ')keys.hand=true;});
document.addEventListener('keyup',e=>{if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')keys.up=false;if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')keys.down=false;if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;if(e.key==='n'||e.key==='N')keys.nitro=false;if(e.key===' ')keys.hand=false;});
function setupTouch(id,key){const el=document.getElementById(id);if(!el)return;el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});el.addEventListener('mousedown',()=>keys[key]=true);el.addEventListener('mouseup',()=>keys[key]=false);}
setupTouch('btn-gas','up');setupTouch('btn-brake','down');setupTouch('btn-left','left');setupTouch('btn-right','right');setupTouch('btn-nitro','nitro');setupTouch('btn-hb','hand');
let camX=0,camY=0;
const rainDrops=[];
for(let i=0;i<150;i++)rainDrops.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,l:10+Math.random()*20,s:8+Math.random()*6});
const rainCtx=document.getElementById('rain-canvas').getContext('2d');
function drawRain(){rainCtx.clearRect(0,0,window.innerWidth,window.innerHeight);rainCtx.strokeStyle='rgba(150,200,255,0.5)';rainCtx.lineWidth=1;rainDrops.forEach(d=>{rainCtx.beginPath();rainCtx.moveTo(d.x,d.y);rainCtx.lineTo(d.x-2,d.y+d.l);rainCtx.stroke();d.y+=d.s;d.x-=1;if(d.y>window.innerHeight){d.y=-20;d.x=Math.random()*window.innerWidth;}});}
let lastTime=0;
function update(ts){const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
if(!state.playing){requestAnimationFrame(update);return;}
const spd=keys.nitro&&state.nitro>0?car.maxSpeed*car.nitroBoost:car.maxSpeed;
if(keys.up)car.speed=Math.min(car.speed+car.acc*dt,spd);
else if(keys.down)car.speed=Math.max(car.speed-car.acc*1.5*dt,-spd*0.5);
else car.speed*=Math.pow(0.9,dt);
if(Math.abs(car.speed)>0.1){if(keys.left)car.angle-=car.handling*(keys.hand?1.6:1)*dt*Math.sign(car.speed);if(keys.right)car.angle+=car.handling*(keys.hand?1.6:1)*dt*Math.sign(car.speed);}
car.vx=Math.sin(car.angle)*car.speed;car.vy=-Math.cos(car.angle)*car.speed;
let nx=car.x+car.vx*dt,ny=car.y+car.vy*dt;
nx=Math.max(20,Math.min(WORLD-20,nx));ny=Math.max(20,Math.min(WORLD-20,ny));
BLOCKS.forEach(b=>{if(nx>b.x-15&&nx<b.x+b.w+15&&ny>b.y-15&&ny<b.y+b.h+15){const dmg=Math.abs(car.speed)*0.8;if(dmg>1){state.health=Math.max(0,state.health-dmg);addExplosion(nx,ny,'#ff4400');}car.speed*=-0.3;nx=car.x;ny=car.y;}});
car.x=nx;car.y=ny;
if(keys.nitro&&state.nitro>0){state.nitro=Math.max(0,state.nitro-1.5*dt);addParticle(car.x,car.y,'#00aaff');}else if(!keys.nitro){state.nitro=Math.min(100,state.nitro+0.4*dt);}
if(keys.hand&&Math.abs(car.speed)>1)addParticle(car.x,car.y,'#888888');
if(state.wantedLevel>0&&police.length<state.wantedLevel)spawnPolice(state.wantedLevel-police.length);
if(state.wantedLevel===0)police.splice(0,police.length);
police.forEach(p=>{const dx=car.x-p.x,dy=car.y-p.y,dist=Math.sqrt(dx*dx+dy*dy),tAngle=Math.atan2(dx,-dy);let dA=tAngle-p.angle;while(dA>Math.PI)dA-=Math.PI*2;while(dA<-Math.PI)dA+=Math.PI*2;p.angle+=dA*0.05*dt;const pSpd=4.5+state.wantedLevel*0.5;p.x+=Math.sin(p.angle)*pSpd*dt;p.y-=Math.cos(p.angle)*pSpd*dt;p.x=Math.max(10,Math.min(WORLD-10,p.x));p.y=Math.max(10,Math.min(WORLD-10,p.y));if(dist<30){state.health=Math.max(0,state.health-0.5*dt);if(state.wantedLevel<5&&Math.random()<0.005)state.wantedLevel++;}if(dist>1200){const a2=Math.random()*Math.PI*2;p.x=car.x+Math.cos(a2)*600;p.y=car.y+Math.sin(a2)*600;}});
if(target&&state.currentMission!==null){const dx=car.x-target.x,dy=car.y-target.y;if(Math.sqrt(dx*dx+dy*dy)<60)completeMission(state.currentMission);}
if(state.health<=0)respawn();
particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.r=Math.max(0,p.r-0.1*dt);});particles=particles.filter(p=>p.life>0);
explosions.forEach(e=>{e.r+=2*dt;e.life-=dt;});explosions=explosions.filter(e=>e.life>0);
camX=car.x-canvas.width/2;camY=car.y-canvas.height/2;
updateHUD();draw();drawRain();
requestAnimationFrame(update);}
function addParticle(x,y,color){particles.push({x,y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:15,r:4,color});}
function addExplosion(x,y,color){explosions.push({x,y,r:5,life:10,color});}
function respawn(){state.health=100;car.speed=0;car.x=1000;car.y=1000;state.wantedLevel=Math.max(0,state.wantedLevel-1);police.splice(0,police.length);showMsg('&#128165; WRECKED!','You respawned at the garage!');saveState();}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(-camX,-camY);
ctx.fillStyle='#0d0d18';ctx.fillRect(0,0,WORLD,WORLD);
ctx.strokeStyle='#1a1a2e';ctx.lineWidth=ROAD_W;
for(let x=0;x<WORLD;x+=220){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD);ctx.stroke();}
for(let y=0;y<WORLD;y+=220){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD,y);ctx.stroke();}
ctx.strokeStyle='#ffaa0022';ctx.lineWidth=2;ctx.setLineDash([20,20]);
for(let x=0;x<WORLD;x+=220){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD);ctx.stroke();}
for(let y=0;y<WORLD;y+=220){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD,y);ctx.stroke();}
ctx.setLineDash([]);
BLOCKS.forEach(b=>{ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(b.x+6,b.y+6,b.w,b.h);ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle='rgba(255,220,100,0.12)';for(let wy=b.y+8;wy<b.y+b.h-5;wy+=14){for(let wx=b.x+6;wx<b.x+b.w-5;wx+=14){if(Math.random()>0.3)ctx.fillRect(wx,wy,8,8);}}ctx.strokeStyle=b.neon;ctx.lineWidth=1.5;ctx.shadowColor=b.neon;ctx.shadowBlur=8;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;});
if(target){const pulse=0.7+0.3*Math.sin(Date.now()/200);ctx.strokeStyle='#ffaa00';ctx.lineWidth=3;ctx.shadowColor='#ffaa00';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(target.x,target.y,30*pulse,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(target.x,target.y,10,0,Math.PI*2);ctx.fillStyle='#ffaa0088';ctx.fill();ctx.shadowBlur=0;drawArrow();}
particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+'aa';ctx.fill();});
explosions.forEach(e=>{ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.stroke();});
police.forEach(p=>drawPolice(p));
drawPlayerCar();
ctx.restore();drawMinimap();}
function drawPlayerCar(){ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle);const c=CARS[state.selectedCar];ctx.shadowColor=c.color;ctx.shadowBlur=18;ctx.fillStyle=c.color;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(-12,-18,24,36,4);else{ctx.rect(-12,-18,24,36);}ctx.fill();ctx.fillStyle='rgba(200,240,255,0.4)';ctx.fillRect(-9,-10,18,10);ctx.fillStyle='#ffffaa';ctx.fillRect(-10,-17,7,5);ctx.fillRect(3,-17,7,5);ctx.fillStyle='#ff2200';ctx.fillRect(-10,12,6,4);ctx.fillRect(4,12,6,4);if(keys.nitro&&state.nitro>0){ctx.fillStyle='#00aaff';ctx.beginPath();ctx.ellipse(0,22,6,10+Math.random()*8,0,0,Math.PI*2);ctx.fill();}ctx.shadowBlur=0;ctx.restore();}
function drawPolice(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.shadowColor='#0044ff';ctx.shadowBlur=15;ctx.fillStyle='#0044cc';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(-10,-16,20,32,3);else ctx.rect(-10,-16,20,32);ctx.fill();const lt=Math.floor(Date.now()/200)%2;ctx.fillStyle=lt?'#ff0000':'#0000ff';ctx.fillRect(-8,-15,6,5);ctx.fillStyle=lt?'#0000ff':'#ff0000';ctx.fillRect(2,-15,6,5);ctx.shadowBlur=0;ctx.restore();}
function drawArrow(){if(!target)return;const dx=target.x-car.x,dy=target.y-car.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<80)return;const ang=Math.atan2(dx,-dy),ax=car.x+Math.sin(ang)*70,ay=car.y-Math.cos(ang)*70;ctx.save();ctx.translate(ax,ay);ctx.rotate(ang);ctx.shadowColor='#ffaa00';ctx.shadowBlur=10;ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(8,6);ctx.lineTo(0,2);ctx.lineTo(-8,6);ctx.closePath();ctx.fill();ctx.rotate(-ang);ctx.fillStyle='#ffaa00';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText(Math.floor(dist)+'m',0,24);ctx.shadowBlur=0;ctx.restore();}
function drawMinimap(){const mc=document.getElementById('minimapCanvas'),mx=mc.getContext('2d'),S=110/WORLD;mx.fillStyle='#0a0a15';mx.fillRect(0,0,110,110);mx.fillStyle='#1a1a30';for(let x=0;x<WORLD;x+=220)mx.fillRect(x*S-1,0,3,110);for(let y=0;y<WORLD;y+=220)mx.fillRect(0,y*S-1,110,3);BLOCKS.forEach(b=>{mx.fillStyle='#222';mx.fillRect(b.x*S,b.y*S,b.w*S,b.h*S);});if(target){mx.fillStyle='#ffaa00';mx.beginPath();mx.arc(target.x*S,target.y*S,4,0,Math.PI*2);mx.fill();}police.forEach(p=>{mx.fillStyle='#0044ff';mx.beginPath();mx.arc(p.x*S,p.y*S,2,0,Math.PI*2);mx.fill();});mx.fillStyle='#00ffe0';mx.beginPath();mx.arc(car.x*S,car.y*S,4,0,Math.PI*2);mx.fill();mx.strokeStyle='#00ffe0';mx.lineWidth=1;mx.strokeRect(0,0,110,110);}
function updateHUD(){document.getElementById('cash-val').textContent='$'+Math.floor(state.cash);document.getElementById('car-val').textContent=CARS[state.selectedCar].name;document.getElementById('health-fill').style.width=state.health+'%';document.getElementById('nitro-fill').style.width=state.nitro+'%';document.getElementById('speed-val').textContent=Math.abs(Math.round(car.speed*20));for(let i=1;i<=5;i++)document.getElementById('s'+i).className='star'+(i<=state.wantedLevel?' active':'');}
function startMission(id){const m=MISSIONS[id];state.currentMission=id;target={x:m.target.x,y:m.target.y};document.getElementById('mission-text').textContent=m.name;document.getElementById('mission-reward').textContent='Reward: $'+m.reward+' — Drive to target!';hideMissions();document.getElementById('main-menu').style.display='none';state.playing=true;showMsg('MISSION: '+m.name,m.story);saveState();}
function completeMission(id){const m=MISSIONS[id];state.cash+=m.reward;if(!state.completedMissions.includes(id))state.completedMissions.push(id);state.currentMission=null;target=null;document.getElementById('mission-text').textContent='Mission Complete!';document.getElementById('mission-reward').textContent='+$'+m.reward+' earned!';for(let i=0;i<10;i++)addParticle(car.x+Math.random()*100-50,car.y+Math.random()*100-50,'#ffaa00');showMsg('MISSION COMPLETE!','You earned $'+m.reward+'\nTotal Cash: $'+Math.floor(state.cash));saveState();}
function startGame(){document.getElementById('main-menu').style.display='none';state.playing=true;if(state.currentMission===null){target={x:1400,y:800};document.getElementById('mission-text').textContent='Explore Neo City!';document.getElementById('mission-reward').textContent='Open MISSIONS for objectives!';}showMsg('NEON RUSH','Welcome to Neo City!\n\nWASD or Arrow Keys to drive\nN = Nitro  Space = Drift\n\nOpen MISSIONS to start!');}
function showMissions(){const el=document.getElementById('mission-screen'),list=document.getElementById('mission-list');el.style.display='flex';list.innerHTML='';MISSIONS.forEach((m,i)=>{const done=state.completedMissions.includes(i),locked=i>1&&!state.completedMissions.includes(i-1),cls=done?'completed':locked?'locked':'available',diffCls=m.diff==='easy'?'diff-easy':m.diff==='medium'?'diff-medium':'diff-hard';list.innerHTML+=`<div class="mission-card ${cls}"><div class="m-info"><div class="m-name">${m.name}</div><div class="m-desc">${m.desc}</div><div class="m-diff ${diffCls}">${m.diff.toUpperCase()}</div></div><div class="m-right"><div class="m-reward-text">$${m.reward}</div><div class="m-status">${done?'&#9989;':locked?'&#128274;':'&#127919;'}</div>${!done&&!locked?`<button class="start-btn" onclick="startMission(${i})">START</button>`:''}</div></div>`;});}
function hideMissions(){document.getElementById('mission-screen').style.display='none';}
function showGarage(){const el=document.getElementById('garage-screen'),list=document.getElementById('car-list');el.style.display='flex';document.getElementById('garage-cash').textContent='Cash: $'+Math.floor(state.cash);list.innerHTML='';CARS.forEach((c,i)=>{const owned=state.ownedCars.includes(i),selected=state.selectedCar===i,canBuy=state.cash>=c.price,spd=Math.round(c.speed/10*80),hdl=Math.round(c.handling/10*80),arm=Math.round(c.armor/10*80);list.innerHTML+=`<div class="car-card ${selected?'selected':owned?'owned':''}"><div style="display:flex;align-items:center;gap:12px"><div class="car-icon">${c.icon}</div><div class="car-info"><div class="c-name">${c.name}</div><div class="c-stats"><div class="c-stat">Speed <span class="stat-bar" style="width:${spd}px;background:${c.color}"></span></div><div class="c-stat">Handle <span class="stat-bar" style="width:${hdl}px;background:#00ff88"></span></div><div class="c-stat">Armor <span class="stat-bar" style="width:${arm}px;background:#ff8800"></span></div></div></div></div><div class="car-right"><div class="car-price">${c.price===0?'FREE':'$'+c.price}</div>${selected?'<div style="color:#aa00ff;font-size:12px;margin-top:6px">IN USE</div>':owned?`<button class="select-btn" onclick="selectCar(${i})">SELECT</button>`:`<button class="buy-btn" onclick="buyCar(${i})" ${canBuy?'':'disabled'}>${canBuy?'BUY':'NEED $'+c.price}</button>`}</div></div>`;});}
function hideGarage(){document.getElementById('garage-screen').style.display='none';}
function buyCar(id){const c=CARS[id];if(state.cash<c.price){showMsg('Not Enough Cash!','You need $'+c.price+'\nComplete more missions!');return;}state.cash-=c.price;state.ownedCars.push(id);selectCar(id);showGarage();saveState();}
function selectCar(id){state.selectedCar=id;applyCar(id);showGarage();saveState();}
function showMsg(title,sub){const m=document.getElementById('message');document.getElementById('msg-title').textContent=title;document.getElementById('msg-sub').textContent=sub;m.style.display='block';}
function closeMessage(){document.getElementById('message').style.display='none';}
requestAnimationFrame(update);
</script>
</body>
</html>
