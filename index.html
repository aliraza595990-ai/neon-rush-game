<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON RUSH - Open World Driving Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
canvas { display: block; }

/* UI Overlay */
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

/* HUD Top */
#hud-top { position: fixed; top: 0; left: 0; right: 0; padding: 10px 15px; display: flex; justify-content: space-between; align-items: flex-start; }
#money-display { background: rgba(0,255,100,0.15); border: 1px solid #00ff64; border-radius: 8px; padding: 6px 14px; font-size: 18px; font-weight: bold; color: #00ff64; text-shadow: 0 0 10px #00ff64; }
#speed-display { background: rgba(0,200,255,0.15); border: 1px solid #00c8ff; border-radius: 8px; padding: 6px 14px; font-size: 18px; font-weight: bold; color: #00c8ff; text-shadow: 0 0 10px #00c8ff; }

/* Wanted Stars */
#wanted { position: fixed; top: 55px; right: 15px; display: flex; gap: 4px; }
.star { width: 22px; height: 22px; background: #333; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.3s; }
.star.active { background: #ff4400; box-shadow: 0 0 8px #ff4400; }

/* Mission Panel */
#mission-panel { position: fixed; top: 85px; left: 15px; background: rgba(0,0,0,0.7); border: 1px solid #ff6600; border-radius: 10px; padding: 10px 15px; max-width: 220px; }
#mission-title { color: #ff6600; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
#mission-desc { color: #fff; font-size: 11px; line-height: 1.4; }
#mission-progress { color: #00ff64; font-size: 11px; margin-top: 5px; }

/* Minimap */
#minimap { position: fixed; bottom: 150px; right: 15px; width: 110px; height: 110px; border: 2px solid #00c8ff; border-radius: 8px; background: rgba(0,10,20,0.85); overflow: hidden; }
#minimap canvas { width: 100%; height: 100%; }

/* Controls */
#controls { position: fixed; bottom: 0; left: 0; right: 0; height: 140px; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 15px 15px; pointer-events: all; }

/* Left Controls - Steering */
#left-controls { display: flex; gap: 10px; align-items: flex-end; }
.ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; active: background: rgba(255,255,255,0.3); transition: all 0.1s; }
.ctrl-btn:active, .ctrl-btn.pressed { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.8); transform: scale(0.93); }

/* Right Controls */
#right-controls { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
#right-row1 { display: flex; gap: 8px; }
#right-row2 { display: flex; gap: 8px; }
.gas-btn { background: rgba(0,255,100,0.25); border-color: #00ff64; }
.brake-btn { background: rgba(255,50,50,0.25); border-color: #ff3232; }
.nitro-btn { background: rgba(0,150,255,0.25); border-color: #0096ff; width: 70px !important; }
.hand-btn { background: rgba(255,165,0,0.25); border-color: #ffa500; }

/* Screens */
.screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* Main Menu */
#main-menu { background: linear-gradient(180deg, #020510 0%, #0a0220 50%, #020510 100%); }
#menu-title { font-size: 52px; font-weight: 900; color: #fff; text-shadow: 0 0 30px #ff6600, 0 0 60px #ff3300; letter-spacing: 8px; margin-bottom: 5px; animation: pulse 2s infinite; }
#menu-subtitle { font-size: 14px; color: #ff6600; letter-spacing: 4px; margin-bottom: 40px; }
.menu-btn { background: linear-gradient(135deg, #ff6600, #ff3300); border: none; color: #fff; font-size: 18px; font-weight: bold; padding: 14px 50px; border-radius: 8px; cursor: pointer; margin: 8px; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255,100,0,0.5); transition: all 0.2s; min-width: 220px; }
.menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,100,0,0.8); }
.menu-btn.secondary { background: linear-gradient(135deg, #0066ff, #0033cc); box-shadow: 0 0 20px rgba(0,100,255,0.5); }
#menu-cash { color: #00ff64; font-size: 20px; margin-bottom: 15px; }
#menu-car-info { color: #00c8ff; font-size: 14px; margin-bottom: 25px; }

/* Mission Select */
#mission-select { background: rgba(0,0,0,0.95); }
#mission-list { width: 90%; max-width: 400px; max-height: 70vh; overflow-y: auto; }
.mission-item { background: rgba(255,102,0,0.1); border: 1px solid #ff6600; border-radius: 10px; padding: 14px; margin: 8px 0; cursor: pointer; transition: all 0.2s; }
.mission-item:hover { background: rgba(255,102,0,0.25); transform: scale(1.02); }
.mission-name { font-size: 16px; font-weight: bold; color: #ff6600; }
.mission-desc { font-size: 12px; color: #aaa; margin-top: 4px; }
.mission-reward { font-size: 13px; color: #00ff64; margin-top: 5px; }
.mission-diff { font-size: 11px; margin-top: 3px; }
.diff-easy { color: #00ff64; }
.diff-medium { color: #ffaa00; }
.diff-hard { color: #ff3300; }
.mission-locked { opacity: 0.4; cursor: not-allowed; }

/* Garage */
#garage-screen { background: rgba(0,0,0,0.95); }
.garage-cars { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-height: 55vh; overflow-y: auto; width: 90%; max-width: 450px; }
.car-card { background: rgba(0,150,255,0.1); border: 1px solid #0096ff; border-radius: 10px; padding: 12px; width: 130px; cursor: pointer; transition: all 0.2s; text-align: center; }
.car-card:hover { background: rgba(0,150,255,0.25); transform: scale(1.03); }
.car-card.owned { border-color: #00ff64; background: rgba(0,255,100,0.1); }
.car-card.selected { border-color: #ffaa00; box-shadow: 0 0 15px rgba(255,170,0,0.5); }
.car-emoji { font-size: 36px; margin-bottom: 6px; }
.car-name { font-size: 12px; font-weight: bold; color: #00c8ff; }
.car-stats { font-size: 10px; color: #888; margin-top: 3px; }
.car-price { font-size: 13px; color: #00ff64; font-weight: bold; margin-top: 5px; }

/* Notifications */
#notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid #ff6600; border-radius: 12px; padding: 20px 35px; font-size: 18px; font-weight: bold; z-index: 200; display: none; text-align: center; }

/* Mission Complete */
#mission-complete { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #001500, #002800); border: 2px solid #00ff64; border-radius: 15px; padding: 25px 40px; z-index: 200; display: none; text-align: center; }
#mc-title { font-size: 26px; font-weight: bold; color: #00ff64; text-shadow: 0 0 15px #00ff64; }
#mc-reward { font-size: 20px; color: #ffaa00; margin: 10px 0; }
#mc-btn { background: #00ff64; color: #000; border: none; padding: 12px 35px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }

/* Game Over */
#game-over { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #150000, #280000); border: 2px solid #ff0000; border-radius: 15px; padding: 25px 40px; z-index: 200; display: none; text-align: center; }
#go-title { font-size: 28px; font-weight: bold; color: #ff0000; text-shadow: 0 0 15px #ff0000; }
#go-btn { background: #ff3300; color: #fff; border: none; padding: 12px 35px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }

/* Screen Titles */
.screen-title { font-size: 28px; font-weight: bold; color: #ff6600; margin-bottom: 20px; letter-spacing: 3px; text-shadow: 0 0 15px #ff6600; }
.back-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 15px; }

/* Nitro Bar */
#nitro-bar-container { position: fixed; bottom: 145px; left: 15px; width: 120px; }
#nitro-label { font-size: 10px; color: #0096ff; margin-bottom: 3px; }
#nitro-bar-bg { height: 8px; background: rgba(0,100,255,0.2); border: 1px solid #0096ff; border-radius: 4px; }
#nitro-bar { height: 100%; background: linear-gradient(90deg, #0066ff, #00c8ff); border-radius: 4px; transition: width 0.1s; }

/* Health Bar */
#health-bar-container { position: fixed; bottom: 160px; left: 15px; width: 120px; }
#health-label { font-size: 10px; color: #ff3300; margin-bottom: 3px; }
#health-bar-bg { height: 8px; background: rgba(255,0,0,0.2); border: 1px solid #ff3300; border-radius: 4px; }
#health-bar { height: 100%; background: linear-gradient(90deg, #ff0000, #ff6600); border-radius: 4px; transition: width 0.2s; }

/* Timer */
#timer-display { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(255,165,0,0.15); border: 1px solid #ffa500; border-radius: 8px; padding: 5px 15px; font-size: 18px; font-weight: bold; color: #ffa500; display: none; }

/* Rain */
#rain-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 5; opacity: 0.35; }

/* Flash */
#flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 150; opacity: 0; background: white; transition: opacity 0.1s; }

@keyframes pulse { 0%,100%{text-shadow:0 0 30px #ff6600,0 0 60px #ff3300} 50%{text-shadow:0 0 50px #ff6600,0 0 100px #ff3300,0 0 150px #ff0000} }

/* Neon city buildings in menu */
.city-bg { position: absolute; bottom: 0; left: 0; right: 0; height: 200px; display: flex; align-items: flex-end; gap: 3px; padding: 0 10px; opacity: 0.4; }
.building { background: linear-gradient(180deg, #001133, #000011); border: 1px solid #0033ff; min-width: 20px; position: relative; }
.building::before { content: ''; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #ff0000; border-radius: 50%; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #ff6600; border-radius: 2px; }
</style>
</head>
<body>

<!-- Rain Canvas -->
<canvas id="rain-canvas"></canvas>

<!-- Flash Effect -->
<div id="flash"></div>

<!-- Main Game Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="ui">
  <div id="hud-top">
    <div id="money-display">💰 $<span id="money-val">500</span></div>
    <div id="timer-display">⏱️ <span id="timer-val">60</span>s</div>
    <div id="speed-display">🚗 <span id="speed-val">0</span> km/h</div>
  </div>
  <div id="wanted">
    <div class="star" id="s1">⭐</div>
    <div class="star" id="s2">⭐</div>
    <div class="star" id="s3">⭐</div>
    <div class="star" id="s4">⭐</div>
    <div class="star" id="s5">⭐</div>
  </div>
  <div id="mission-panel" style="display:none">
    <div id="mission-title">MISSION</div>
    <div id="mission-desc">Go to the target!</div>
    <div id="mission-progress"></div>
  </div>
  <div id="health-bar-container">
    <div id="health-label">❤️ HEALTH</div>
    <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
  </div>
  <div id="nitro-bar-container">
    <div id="nitro-label">⚡ NITRO</div>
    <div id="nitro-bar-bg"><div id="nitro-bar" style="width:100%"></div></div>
  </div>
  <div id="minimap"><canvas id="minimapCanvas" width="110" height="110"></canvas></div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="left-controls">
    <button class="ctrl-btn" id="btn-left" ontouchstart="keys.left=true" ontouchend="keys.left=false" onmousedown="keys.left=true" onmouseup="keys.left=false">◀</button>
    <button class="ctrl-btn" id="btn-right" ontouchstart="keys.right=true" ontouchend="keys.right=false" onmousedown="keys.right=true" onmouseup="keys.right=false">▶</button>
  </div>
  <div id="right-controls">
    <div id="right-row1">
      <button class="ctrl-btn hand-btn" ontouchstart="keys.handbrake=true" ontouchend="keys.handbrake=false" onmousedown="keys.handbrake=true" onmouseup="keys.handbrake=false">🔒</button>
      <button class="ctrl-btn nitro-btn" ontouchstart="keys.nitro=true" ontouchend="keys.nitro=false" onmousedown="keys.nitro=true" onmouseup="keys.nitro=false">⚡</button>
    </div>
    <div id="right-row2">
      <button class="ctrl-btn brake-btn" ontouchstart="keys.brake=true" ontouchend="keys.brake=false" onmousedown="keys.brake=true" onmouseup="keys.brake=false">⬇️</button>
      <button class="ctrl-btn gas-btn" ontouchstart="keys.gas=true" ontouchend="keys.gas=false" onmousedown="keys.gas=true" onmouseup="keys.gas=false">⬆️</button>
    </div>
  </div>
</div>

<!-- MAIN MENU -->
<div class="screen" id="main-menu">
  <div class="city-bg" id="city-bg"></div>
  <div id="menu-title">NEON RUSH</div>
  <div id="menu-subtitle">OPEN WORLD DRIVING GAME</div>
  <div id="menu-cash">💰 Cash: $<span id="menu-money">500</span></div>
  <div id="menu-car-info">🚗 Car: <span id="menu-car">Street Sedan</span></div>
  <button class="menu-btn" onclick="startGame()">🎮 PLAY</button>
  <button class="menu-btn secondary" onclick="showMissions()">📋 MISSIONS</button>
  <button class="menu-btn secondary" onclick="showGarage()">🏎️ GARAGE</button>
</div>

<!-- MISSION SELECT -->
<div class="screen" id="mission-screen" style="display:none">
  <div class="screen-title">📋 SELECT MISSION</div>
  <div id="mission-list" class="mission-list"></div>
  <button class="back-btn" onclick="showMenu()">◀ BACK</button>
</div>

<!-- GARAGE -->
<div class="screen" id="garage-screen" style="display:none">
  <div class="screen-title">🏎️ GARAGE</div>
  <div class="garage-cars" id="garage-cars"></div>
  <button class="back-btn" onclick="showMenu()">◀ BACK</button>
</div>

<!-- NOTIFICATIONS -->
<div id="notification"></div>
<div id="mission-complete">
  <div id="mc-title">✅ MISSION COMPLETE!</div>
  <div id="mc-reward">+$<span id="mc-amount">0</span></div>
  <button id="mc-btn" onclick="hideMissionComplete()">CONTINUE</button>
</div>
<div id="game-over">
  <div id="go-title">💀 BUSTED!</div>
  <div style="color:#888;font-size:13px;margin:10px 0">You were caught by police!</div>
  <button id="go-btn" onclick="respawn()">🔄 RESPAWN (-$200)</button>
  <button class="back-btn" style="margin-top:8px" onclick="goToMenu()">📋 MENU</button>
</div>

<script>
// ============================================================
// NEON RUSH - Complete Game Engine
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimapCanvas');
const mctx = minimapCanvas.getContext('2d');
const rainCanvas = document.getElementById('rain-canvas');
const rctx = rainCanvas.getContext('2d');

// Resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  rainCanvas.width = window.innerWidth;
  rainCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game State
const WORLD = 3000;
let gameState = 'menu';
let money = 500;
let selectedCar = 0;
let ownedCars = [0];
let wantedLevel = 0;
let health = 100;
let nitro = 100;
let activeMission = null;
let missionTimer = 0;
let missionTimerActive = false;
let score = 0;
let gameTime = 0;

// Keys
const keys = { gas:false, brake:false, left:false, right:false, nitro:false, handbrake:false };
document.addEventListener('keydown', e => {
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.gas=true;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.brake=true;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if(e.key===' ') keys.handbrake=true;
  if(e.key==='n'||e.key==='N') keys.nitro=true;
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.gas=false;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.brake=false;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
  if(e.key===' ') keys.handbrake=false;
  if(e.key==='n'||e.key==='N') keys.nitro=false;
});

// CAR DATA
const CARS = [
  { name:'Street Sedan', emoji:'🚗', price:0, speed:180, handling:0.06, armor:100, color:'#4488ff', desc:'Starter car. Reliable.' },
  { name:'Muscle Cruiser', emoji:'🚙', price:1500, speed:220, handling:0.055, armor:130, color:'#ff4422', desc:'Fast and tough.' },
  { name:'Sport GT', emoji:'🏎️', price:3000, speed:280, handling:0.08, armor:80, color:'#ffaa00', desc:'Extreme speed.' },
  { name:'City Taxi', emoji:'🚕', price:800, speed:170, handling:0.065, armor:110, color:'#ffdd00', desc:'Taxi missions bonus.' },
  { name:'Pickup Truck', emoji:'🚚', price:2000, speed:160, handling:0.045, armor:180, color:'#885533', desc:'Heavily armored.' },
  { name:'Black Van', emoji:'🚐', price:2500, speed:150, handling:0.04, armor:200, color:'#222233', desc:'Max armor, slow.' },
  { name:'Police Cruiser', emoji:'🚓', price:5000, speed:240, handling:0.07, armor:150, color:'#2244ff', desc:'Evade police easier.' },
  { name:'SUV Beast', emoji:'🛻', price:4000, speed:200, handling:0.05, armor:160, color:'#334422', desc:'All-round beast.' },
  { name:'Ghost Racer', emoji:'🏁', price:8000, speed:320, handling:0.09, armor:60, color:'#aa00ff', desc:'LEGENDARY. Fastest.' },
  { name:'Neon Phantom', emoji:'⚡', price:12000, speed:350, handling:0.095, armor:70, color:'#00ffaa', desc:'SECRET. Ultimate car.' },
];

// MISSIONS
const MISSIONS = [
  { id:0, name:'First Delivery', desc:'Deliver a package to the docks. Drive fast!', reward:300, diff:'easy', type:'delivery', unlockAt:0, timeLimit:60, targetX:2400, targetY:400 },
  { id:1, name:'Taxi Run', desc:'Pick up 3 passengers around the city.', reward:400, diff:'easy', type:'taxi', unlockAt:0, timeLimit:90, targetX:800, targetY:2600 },
  { id:2, name:'Escape Artist', desc:'Lose the cops! Get away from police pursuit.', reward:500, diff:'easy', type:'escape', unlockAt:0, timeLimit:45, targetX:200, targetY:200 },
  { id:3, name:'Street Race', desc:'Win the downtown street race. Beat 3 rivals!', reward:700, diff:'medium', type:'race', unlockAt:300, timeLimit:120, targetX:1500, targetY:1500 },
  { id:4, name:'Chase & Catch', desc:'Chase the criminal car and stop them!', reward:800, diff:'medium', type:'chase', unlockAt:300, timeLimit:90, targetX:2500, targetY:2500 },
  { id:5, name:'VIP Escort', desc:'Escort the VIP safely to the airport.', reward:1000, diff:'medium', type:'escort', unlockAt:700, timeLimit:100, targetX:100, targetY:100 },
  { id:6, name:'Warehouse Raid', desc:'Get to the warehouse and grab the goods!', reward:1500, diff:'hard', type:'heist', unlockAt:1000, timeLimit:120, targetX:2800, targetY:200 },
  { id:7, name:'Destroy Targets', desc:'Smash all 5 enemy vehicles!', reward:2000, diff:'hard', type:'destroy', unlockAt:1500, timeLimit:150, targetX:1500, targetY:300 },
  { id:8, name:'Boss Chase', desc:'Chief Rex is escaping! Stop his convoy!', reward:3000, diff:'hard', type:'boss', unlockAt:2000, timeLimit:180, targetX:2900, targetY:2900 },
  { id:9, name:'Final Escape', desc:'Break through the police blockade and escape Neo City!', reward:5000, diff:'hard', type:'final', unlockAt:3000, timeLimit:200, targetX:2950, targetY:1500 },
];

// PLAYER CAR
const player = {
  x: 400, y: 400, angle: 0, vx: 0, vy: 0, speed: 0,
  driftFactor: 0, isNitroOn: false,
  get carData() { return CARS[selectedCar]; }
};

// ENEMIES
let enemies = [];
let policeList = [];
let target = null;

// WORLD OBJECTS
const buildings = [];
const roads = [];
const trees = [];

function generateWorld() {
  // Main roads grid
  for(let x=0; x<WORLD; x+=300) {
    roads.push({ x, y:0, w:60, h:WORLD, horiz:false });
  }
  for(let y=0; y<WORLD; y+=300) {
    roads.push({ x:0, y, w:WORLD, h:60, horiz:true });
  }
  // Buildings
  for(let bx=0; bx<WORLD; bx+=300) {
    for(let by=0; by<WORLD; by+=300) {
      const numB = 2+Math.floor(Math.random()*3);
      for(let i=0;i<numB;i++) {
        const bw = 60+Math.random()*100;
        const bh = 60+Math.random()*100;
        const ox = 70+Math.random()*(230-bw);
        const oy = 70+Math.random()*(230-bh);
        const colors = ['#112244','#221133','#113322','#332211','#221122'];
        const neon = ['#0066ff','#ff0066','#00ff66','#ff6600','#aa00ff'];
        buildings.push({
          x:bx+ox, y:by+oy, w:bw, h:bh,
          color: colors[Math.floor(Math.random()*colors.length)],
          neon: neon[Math.floor(Math.random()*neon.length)],
          height: 1+Math.random()*3,
          windows: Math.random()>0.3
        });
      }
    }
  }
  // Trees
  for(let i=0;i<200;i++) {
    trees.push({ x:Math.random()*WORLD, y:Math.random()*WORLD });
  }
  // Spawn enemies
  spawnEnemies();
}

function spawnEnemies() {
  enemies = [];
  for(let i=0;i<8;i++) {
    enemies.push({
      x: 200+Math.random()*(WORLD-400),
      y: 200+Math.random()*(WORLD-400),
      angle: Math.random()*Math.PI*2,
      vx:0, vy:0, speed:0,
      type: Math.random()>0.5 ? 'civilian' : 'gang',
      hp: 100,
      color: Math.random()>0.5 ? '#ff4422' : '#22aa44',
      size: 16+Math.random()*6
    });
  }
}

function spawnPolice() {
  const count = wantedLevel;
  policeList = [];
  for(let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const dist = 400+Math.random()*300;
    policeList.push({
      x: player.x + Math.cos(angle)*dist,
      y: player.y + Math.sin(angle)*dist,
      angle: 0, vx:0, vy:0, speed:0, hp:100,
      isHelicopter: wantedLevel>=4 && i===0,
      isSWAT: wantedLevel>=5 && i===0
    });
  }
}

// CAMERA
const cam = { x:0, y:0 };

// RAIN
let raindrops = [];
for(let i=0;i<150;i++) {
  raindrops.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight, speed:8+Math.random()*8, len:10+Math.random()*15 });
}

function drawRain() {
  rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
  rctx.strokeStyle='rgba(150,200,255,0.5)';
  rctx.lineWidth=1;
  raindrops.forEach(r=>{
    rctx.beginPath();
    rctx.moveTo(r.x,r.y);
    rctx.lineTo(r.x-2,r.y+r.len);
    rctx.stroke();
    r.y+=r.speed;
    r.x-=1;
    if(r.y>rainCanvas.height){r.y=-r.len;r.x=Math.random()*rainCanvas.width;}
  });
}

// DRAW WORLD
function drawWorld() {
  // Sky / background
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#020510');
  grad.addColorStop(1,'#0a0220');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(-cam.x+canvas.width/2, -cam.y+canvas.height/2);

  // Ground
  ctx.fillStyle='#111118';
  ctx.fillRect(0,0,WORLD,WORLD);

  // Roads
  roads.forEach(r=>{
    ctx.fillStyle='#1a1a2a';
    ctx.fillRect(r.x,r.y,r.w,r.h);
    // Road markings
    ctx.strokeStyle='rgba(255,255,100,0.3)';
    ctx.setLineDash([30,30]);
    ctx.lineWidth=2;
    ctx.beginPath();
    if(r.horiz){ ctx.moveTo(r.x,r.y+r.h/2); ctx.lineTo(r.x+r.w,r.y+r.h/2); }
    else { ctx.moveTo(r.x+r.w/2,r.y); ctx.lineTo(r.x+r.w/2,r.y+r.h); }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Buildings
  buildings.forEach(b=>{
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(b.x+5,b.y+5,b.w,b.h);
    // Building body
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    // Neon border
    ctx.strokeStyle=b.neon;
    ctx.lineWidth=1.5;
    ctx.shadowColor=b.neon;
    ctx.shadowBlur=8;
    ctx.strokeRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
    // Windows
    if(b.windows){
      for(let wx=b.x+8;wx<b.x+b.w-8;wx+=14){
        for(let wy=b.y+8;wy<b.y+b.h-8;wy+=14){
          if(Math.random()>0.3){
            ctx.fillStyle=Math.random()>0.2?'rgba(255,255,150,0.5)':'rgba(0,100,255,0.3)';
            ctx.fillRect(wx,wy,8,8);
          }
        }
      }
    }
  });

  // Trees
  trees.forEach(t=>{
    ctx.fillStyle='#1a4422';
    ctx.beginPath();
    ctx.arc(t.x,t.y,8,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#00ff6622';
    ctx.beginPath();
    ctx.arc(t.x,t.y,10,0,Math.PI*2);
    ctx.fill();
  });

  // Mission Target
  if(target && activeMission){
    const pulse = 0.6+0.4*Math.sin(gameTime*0.1);
    ctx.strokeStyle=`rgba(255,100,0,${pulse})`;
    ctx.lineWidth=3;
    ctx.shadowColor='#ff6600';
    ctx.shadowBlur=15;
    for(let r=20;r<=60;r+=20){
      ctx.beginPath();
      ctx.arc(target.x,target.y,r,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,100,0,0.2)';
    ctx.beginPath();
    ctx.arc(target.x,target.y,25,0,Math.PI*2);
    ctx.fill();
    // Target icon
    ctx.fillStyle='#ff6600';
    ctx.font='bold 20px Arial';
    ctx.textAlign='center';
    ctx.fillText('🎯',target.x,target.y+7);
  }

  // Police
  policeList.forEach(p=>{
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);
    if(p.isHelicopter){
      ctx.font='28px Arial';
      ctx.textAlign='center';
      ctx.fillText('🚁',0,5);
    } else {
      ctx.shadowColor='#2244ff';
      ctx.shadowBlur=12;
      ctx.fillStyle='#2244ff';
      ctx.fillRect(-14,-8,28,16);
      ctx.fillStyle='#ffffff';
      ctx.fillRect(-10,-5,8,5);
      ctx.fillRect(2,-5,8,5);
      // Police lights
      const t2 = Date.now()/200;
      ctx.fillStyle=Math.sin(t2)>0?'#ff0000':'#0000ff';
      ctx.fillRect(-8,-10,6,5);
      ctx.fillRect(2,-10,6,5);
      ctx.shadowBlur=0;
    }
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e=>{
    if(e.hp<=0) return;
    ctx.save();
    ctx.translate(e.x,e.y);
    ctx.rotate(e.angle);
    ctx.fillStyle=e.color;
    ctx.shadowColor=e.color;
    ctx.shadowBlur=8;
    ctx.fillRect(-e.size/2,-e.size/3,e.size,e.size*0.6);
    ctx.shadowBlur=0;
    ctx.restore();
  });

  // Player Car
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(player.angle);

  const carColor = CARS[selectedCar].color;
  // Car glow
  ctx.shadowColor=carColor;
  ctx.shadowBlur=player.isNitroOn?25:12;

  // Car body
  ctx.fillStyle=carColor;
  ctx.beginPath();
  ctx.roundRect(-20,-10,40,20,4);
  ctx.fill();

  // Windows
  ctx.fillStyle='rgba(150,220,255,0.7)';
  ctx.fillRect(-8,-7,14,7);
  ctx.fillRect(5,-7,10,7);

  // Wheels
  ctx.fillStyle='#111';
  [[-16,-12],[-16,8],[12,-12],[12,8]].forEach(([wx,wy])=>{
    ctx.fillRect(wx,wy,8,6);
  });

  // Neon underglow
  ctx.shadowColor='#ff00ff';
  ctx.shadowBlur=15;
  ctx.strokeStyle='rgba(255,0,255,0.4)';
  ctx.lineWidth=2;
  ctx.strokeRect(-22,-12,44,24);
  ctx.shadowBlur=0;

  // Nitro fire
  if(player.isNitroOn){
    ctx.shadowColor='#00aaff';
    ctx.shadowBlur=20;
    ctx.fillStyle='#00aaff';
    ctx.beginPath();
    ctx.moveTo(-22,0);
    ctx.lineTo(-35,-5);
    ctx.lineTo(-30,0);
    ctx.lineTo(-35,5);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();

  // Direction arrow to target
  if(target && activeMission){
    const dx = target.x-player.x;
    const dy = target.y-player.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist>100){
      const ang = Math.atan2(dy,dx);
      const arrowX = player.x+Math.cos(ang)*60;
      const arrowY = player.y+Math.sin(ang)*60;
      ctx.save();
      ctx.translate(arrowX,arrowY);
      ctx.rotate(ang);
      ctx.fillStyle='rgba(255,100,0,0.8)';
      ctx.shadowColor='#ff6600';
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.moveTo(15,0);
      ctx.lineTo(-10,-8);
      ctx.lineTo(-10,8);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.restore();
}

// MINIMAP
function drawMinimap() {
  const scale = 110/WORLD;
  mctx.fillStyle='rgba(0,5,15,0.9)';
  mctx.fillRect(0,0,110,110);

  // Roads on minimap
  mctx.fillStyle='#223';
  roads.forEach(r=>{
    mctx.fillRect(r.x*scale,r.y*scale,r.w*scale,r.h*scale);
  });

  // Player dot
  mctx.fillStyle='#00ff64';
  mctx.shadowColor='#00ff64';
  mctx.shadowBlur=4;
  mctx.beginPath();
  mctx.arc(player.x*scale,player.y*scale,4,0,Math.PI*2);
  mctx.fill();
  mctx.shadowBlur=0;

  // Target on minimap
  if(target && activeMission){
    mctx.fillStyle='#ff6600';
    mctx.beginPath();
    mctx.arc(target.x*scale,target.y*scale,4,0,Math.PI*2);
    mctx.fill();
  }

  // Police on minimap
  policeList.forEach(p=>{
    mctx.fillStyle='#ff0000';
    mctx.beginPath();
    mctx.arc(p.x*scale,p.y*scale,3,0,Math.PI*2);
    mctx.fill();
  });
}

// PHYSICS
function updatePlayer() {
  const car = CARS[selectedCar];
  const maxSpeed = car.speed / 3.6;
  const turnSpeed = car.handling;
  const friction = keys.handbrake ? 0.88 : 0.97;

  let accel = 0;
  if(keys.gas) accel = 0.4;
  if(keys.brake) accel = -0.25;

  // Nitro
  player.isNitroOn = false;
  if(keys.nitro && nitro>0) {
    accel *= 2.2;
    nitro = Math.max(0, nitro-0.8);
    player.isNitroOn = true;
  } else if(!keys.nitro) {
    nitro = Math.min(100, nitro+0.15);
  }

  player.speed += accel;
  player.speed *= friction;
  player.speed = Math.max(-maxSpeed*0.4, Math.min(maxSpeed, player.speed));

  if(Math.abs(player.speed)>0.1){
    if(keys.left) player.angle -= turnSpeed*(Math.abs(player.speed)/maxSpeed);
    if(keys.right) player.angle += turnSpeed*(Math.abs(player.speed)/maxSpeed);
  }

  const nextX = player.x + Math.cos(player.angle)*player.speed;
  const nextY = player.y + Math.sin(player.angle)*player.speed;

  // Boundary
  player.x = Math.max(20,Math.min(WORLD-20,nextX));
  player.y = Math.max(20,Math.min(WORLD-20,nextY));

  // Camera follow
  cam.x = player.x;
  cam.y = player.y;

  // Speed for HUD (km/h)
  const kmh = Math.abs(player.speed)*3.6*10;
  document.getElementById('speed-val').textContent = Math.round(kmh);

  // HUD bars
  document.getElementById('health-bar').style.width = health+'%';
  document.getElementById('nitro-bar').style.width = nitro+'%';
}

function updatePolice() {
  if(wantedLevel===0) { policeList=[]; return; }
  policeList.forEach(p=>{
    const dx = player.x-p.x;
    const dy = player.y-p.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const targetAngle = Math.atan2(dy,dx);
    p.angle += (targetAngle-p.angle)*0.08;
    const policeSpeed = p.isHelicopter ? 3.5 : 2.8+(wantedLevel*0.3);
    p.x += Math.cos(p.angle)*policeSpeed;
    p.y += Math.sin(p.angle)*policeSpeed;
    // Collision with player
    if(dist<30){
      health -= p.isHelicopter ? 0.5 : 0.3;
      if(health<=0) showGameOver();
    }
    if(dist<20 && wantedLevel>=3){
      health -= 1;
    }
  });
}

function updateEnemies() {
  enemies.forEach(e=>{
    if(e.hp<=0) return;
    // Simple wander AI
    e.angle += (Math.random()-0.5)*0.08;
    e.speed = 1+Math.random()*0.5;
    e.x += Math.cos(e.angle)*e.speed;
    e.y += Math.sin(e.angle)*e.speed;
    e.x=Math.max(50,Math.min(WORLD-50,e.x));
    e.y=Math.max(50,Math.min(WORLD-50,e.y));

    // Collision with player
    const dx=player.x-e.x, dy=player.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<25){
      health-=0.5;
      if(e.type==='gang') wantedLevel=Math.min(5,wantedLevel+1);
      updateWantedHUD();
    }

    // Destroy mission
    if(activeMission && activeMission.type==='destroy'){
      if(dist<30){
        e.hp-=2;
      }
    }
  });
}

// WANTED HUD
function updateWantedHUD() {
  for(let i=1;i<=5;i++){
    const s=document.getElementById('s'+i);
    s.classList.toggle('active', i<=wantedLevel);
  }
  // Spawn more police
  if(wantedLevel>0 && policeList.length<wantedLevel) {
    spawnPolice();
  }
}

// MISSION SYSTEM
function startMission(id) {
  const m = MISSIONS[id];
  if(score < m.unlockAt) { notify('🔒 Score '+m.unlockAt+' to unlock!','#ff3300'); return; }
  activeMission = m;
  target = { x:m.targetX, y:m.targetY };
  document.getElementById('mission-panel').style.display='block';
  document.getElementById('mission-title').textContent=m.name.toUpperCase();
  document.getElementById('mission-desc').textContent=m.desc;
  document.getElementById('mission-progress').textContent='🎯 Get to target!';
  if(m.timeLimit){
    missionTimer=m.timeLimit;
    missionTimerActive=true;
    document.getElementById('timer-display').style.display='block';
  }
  showMenu();
  startGame();
  notify('🎮 Mission: '+m.name,'#ff6600');
}

function checkMission() {
  if(!activeMission||!target) return;
  const dx=player.x-target.x, dy=player.y-target.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const distM = Math.round(dist*0.8);
  document.getElementById('mission-progress').textContent='📍 '+distM+'m away';
  if(dist<50){
    completeMission();
  }
  if(missionTimerActive){
    missionTimer-=0.016;
    document.getElementById('timer-val').textContent=Math.ceil(missionTimer);
    if(missionTimer<=0){
      failMission();
    }
  }
}

function completeMission() {
  const reward = activeMission.reward;
  money += reward;
  score += reward;
  wantedLevel = Math.max(0,wantedLevel-1);
  updateWantedHUD();
  document.getElementById('mc-amount').textContent=reward;
  document.getElementById('mission-complete').style.display='block';
  document.getElementById('money-val').textContent=money;
  document.getElementById('menu-money').textContent=money;
  activeMission=null; target=null;
  missionTimerActive=false;
  document.getElementById('timer-display').style.display='none';
  document.getElementById('mission-panel').style.display='none';
}

function failMission() {
  activeMission=null; target=null;
  missionTimerActive=false;
  document.getElementById('timer-display').style.display='none';
  document.getElementById('mission-panel').style.display='none';
  notify('⏰ TIME'S UP! Mission Failed!','#ff0000');
}

function hideMissionComplete() {
  document.getElementById('mission-complete').style.display='none';
}

function showGameOver() {
  gameState='paused';
  document.getElementById('game-over').style.display='block';
}

function respawn() {
  if(money>=200){money-=200;}
  else money=0;
  health=50; wantedLevel=Math.max(0,wantedLevel-2);
  player.x=400; player.y=400; player.speed=0;
  policeList=[]; updateWantedHUD();
  document.getElementById('game-over').style.display='none';
  document.getElementById('money-val').textContent=money;
  gameState='playing';
}

function goToMenu() {
  document.getElementById('game-over').style.display='none';
  document.getElementById('mission-panel').style.display='none';
  activeMission=null; target=null;
  missionTimerActive=false;
  health=100; wantedLevel=0; policeList=[];
  updateWantedHUD();
  showMenu();
}

// NOTIFICATION
function notify(msg, color='#ff6600') {
  const n=document.getElementById('notification');
  n.textContent=msg; n.style.color=color; n.style.borderColor=color;
  n.style.display='block';
  clearTimeout(window._notifyTimer);
  window._notifyTimer=setTimeout(()=>n.style.display='none',2500);
}

// SCREENS
function showMenu() {
  gameState='menu';
  document.getElementById('main-menu').style.display='flex';
  document.getElementById('mission-screen').style.display='none';
  document.getElementById('garage-screen').style.display='none';
  document.getElementById('controls').style.display='none';
  document.getElementById('menu-money').textContent=money;
  document.getElementById('menu-car').textContent=CARS[selectedCar].name;
}

function startGame() {
  gameState='playing';
  document.getElementById('main-menu').style.display='none';
  document.getElementById('mission-screen').style.display='none';
  document.getElementById('garage-screen').style.display='none';
  document.getElementById('controls').style.display='flex';
  document.getElementById('money-val').textContent=money;
}

function showMissions() {
  document.getElementById('main-menu').style.display='none';
  document.getElementById('mission-screen').style.display='flex';
  const list=document.getElementById('mission-list');
  list.innerHTML='';
  MISSIONS.forEach(m=>{
    const locked=score<m.unlockAt;
    const d=document.createElement('div');
    d.className='mission-item'+(locked?' mission-locked':'');
    d.innerHTML=`<div class="mission-name">${m.name}</div>
      <div class="mission-desc">${m.desc}</div>
      <div class="mission-reward">💰 Reward: $${m.reward}</div>
      <div class="mission-diff diff-${m.diff}">Difficulty: ${m.diff.toUpperCase()}${locked?' | 🔒 Need $'+m.unlockAt:''}</div>`;
    if(!locked) d.onclick=()=>startMission(m.id);
    list.appendChild(d);
  });
}

function showGarage() {
  document.getElementById('main-menu').style.display='none';
  document.getElementById('garage-screen').style.display='flex';
  const container=document.getElementById('garage-cars');
  container.innerHTML='';
  CARS.forEach((c,i)=>{
    const owned=ownedCars.includes(i);
    const d=document.createElement('div');
    d.className='car-card'+(owned?' owned':'')+(i===selectedCar?' selected':'');
    d.innerHTML=`<div class="car-emoji">${c.emoji}</div>
      <div class="car-name">${c.name}</div>
      <div class="car-stats">⚡${c.speed}km/h ❤️${c.armor}</div>
      <div class="car-price">${owned?(i===selectedCar?'✅ SELECTED':'✅ OWNED'):'💰 $'+c.price}</div>`;
    d.onclick=()=>{
      if(owned){selectedCar=i;showGarage();}
      else if(money>=c.price){money-=c.price;ownedCars.push(i);selectedCar=i;showGarage();notify('🚗 '+c.name+' purchased!','#00ff64');}
      else notify('❌ Not enough cash! Need $'+c.price,'#ff3300');
    };
    container.appendChild(d);
  });
}

// CITY BACKGROUND in MENU
function buildCityBG() {
  const bg=document.getElementById('city-bg');
  for(let i=0;i<60;i++){
    const b=document.createElement('div');
    b.className='building';
    b.style.height=(40+Math.random()*160)+'px';
    b.style.width=(15+Math.random()*40)+'px';
    b.style.borderColor=['#0066ff','#ff0066','#00ff66','#ff6600','#aa00ff'][Math.floor(Math.random()*5)];
    bg.appendChild(b);
  }
}

// MAIN GAME LOOP
function gameLoop() {
  gameTime++;
  if(gameState==='playing'){
    updatePlayer();
    updatePolice();
    updateEnemies();
    checkMission();
    drawWorld();
    drawMinimap();
    drawRain();
    document.getElementById('money-val').textContent=money;
    // Passive wanted level from speed
    const kmh=Math.abs(player.speed)*36;
    if(kmh>150 && Math.random()<0.001 && wantedLevel<2){
      wantedLevel=Math.min(5,wantedLevel+1);
      updateWantedHUD();
      notify('⭐ Wanted Level Up!','#ff4400');
    }
  } else {
    drawRain();
  }
  requestAnimationFrame(gameLoop);
}

// INIT
generateWorld();
buildCityBG();
showMenu();
gameLoop();
</script>
